<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Lydia Yang — Content Strategist (LydiaOS 1.0)</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --crt-green: #33ff66;
            --crt-amber: #ffb000;
            --crt-dim: #1a8c3a;
            --screen-bg: #050e08;
            --beige: #c8b99a;
            --beige-dark: #a89880;
            --beige-light: #ddd0bc;
            --beige-hi: #ede3d4;
            --win-gray: #c0c0c0;
            --desk: #8b7355;
            --desk-dark: #6b5a40;
        }

        html, body { 
            width: 100%; height: 100%; overflow: hidden; 
            background: var(--desk); 
            font-family: 'Share Tech Mono', monospace;
        }

        /* 背景：木质桌面感 */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: linear-gradient(180deg, var(--desk) 0%, var(--desk-dark) 100%);
            z-index: 0;
        }

        .scene {
            position: relative; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; z-index: 1;
        }

        /* --- 1. 显示器外壳 (Monitor) --- */
        .monitor-wrap {
            position: relative; display: flex; flex-direction: column; align-items: center;
            filter: drop-shadow(0 40px 80px rgba(0,0,0,0.6));
            transform: perspective(1400px) rotateX(2deg);
        }

        .monitor {
            position: relative; width: clamp(320px, 85vw, 800px); aspect-ratio: 4/3.2;
            background: linear-gradient(160deg, var(--beige-hi) 0%, var(--beige) 60%, var(--beige-dark) 100%);
            border-radius: 16px 16px 8px 8px; padding: 25px; padding-bottom: 60px;
        }

        /* 屏幕边框 (Bezel) */
        .screen-bezel {
            position: relative; width: 100%; height: 100%;
            background: #2a2520; border-radius: 8px; padding: 10px;
            box-shadow: inset 3px 3px 12px rgba(0,0,0,0.8), inset -1px -1px 3px rgba(255,255,255,0.1);
        }

        /* 电子屏幕层 (Screen) */
        .screen {
            position: relative; width: 100%; height: 100%;
            background: var(--screen-bg); border-radius: 4px; overflow: hidden;
            animation: flicker 0.15s infinite;
        }

        /* CRT 扫描线与反光 */
        .screen::after {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 2px);
            pointer-events: none; z-index: 50;
        }
        .screen-glass {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
            z-index: 60; pointer-events: none;
        }

        @keyframes flicker {
            0% { opacity: 0.985; } 50% { opacity: 1; } 100% { opacity: 0.995; }
        }

        /* --- 2. OS 系统 UI --- */
        .os { position: absolute; inset: 0; display: flex; flex-direction: column; z-index: 10; }

        /* 顶部菜单栏 */
        .menubar {
            height: 24px; background: linear-gradient(180deg, #4a9e5c 0%, #2d7a40 100%);
            display: flex; align-items: center; padding: 0 10px; font-size: 10px; color: white;
            border-bottom: 1px solid #1a4d2a;
        }

        .desktop { flex: 1; position: relative; padding: 15px; }

        /* 图标样式 */
        .icon-grid { display: flex; flex-direction: column; gap: 20px; }
        .desk-icon { width: 60px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .desk-icon img { width: 32px; filter: drop-shadow(0 0 5px var(--crt-green)); }
        .desk-icon span { font-size: 9px; color: var(--crt-green); margin-top: 5px; text-align: center; }

        /* --- 3. 窗口系统 --- */
        .window {
            position: absolute; background: var(--win-gray);
            border: 2px solid; border-color: #fff #808080 #808080 #fff;
            box-shadow: 2px 2px 0 #000; display: none; flex-direction: column;
            min-width: 200px; z-index: 20;
        }
        .window.active { z-index: 30; }

        .titlebar {
            height: 20px; background: #000080; color: white;
            display: flex; align-items: center; padding: 0 5px;
            font-size: 10px; font-weight: bold; cursor: move;
        }
        .close-btn { 
            width: 14px; height: 14px; background: var(--win-gray);
            border: 1px solid #000; font-size: 8px; margin-left: auto;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .window-body {
            margin: 2px; padding: 15px; background: #fff;
            border: 2px solid; border-color: #808080 #fff #fff #808080;
            color: #000; font-size: 12px; height: 200px; overflow-y: auto;
        }

        /* --- 4. 任务栏 --- */
        .taskbar {
            height: 30px; background: var(--win-gray);
            border-top: 2px solid #fff; display: flex; align-items: center; padding: 2px 5px;
        }
        .start-btn {
            border: 2px solid; border-color: #fff #808080 #808080 #fff;
            padding: 2px 8px; font-weight: bold; font-size: 11px; cursor: pointer;
        }

        /* 引导屏幕 */
        #boot-screen {
            position: absolute; inset: 0; background: #000; z-index: 100;
            color: var(--crt-green); padding: 40px; font-family: 'VT323', monospace;
        }

    </style>
</head>
<body>

<div class="scene">
    <div class="monitor-wrap">
        <div class="monitor">
            <div class="screen-bezel">
                <div class="screen">
                    <div class="screen-glass"></div>
                    
                    <div id="boot-screen">
                        <div id="boot-log"></div>
                    </div>

                    <div class="os" id="os-ui" style="display:none">
                        <div class="menubar">
                            <span>LydiaOS v1.0</span>
                            <span style="margin-left:auto" id="clock">00:00</span>
                        </div>
                        
                        <div class="desktop" id="desktop-area">
                            <div class="icon-grid">
                                <div class="desk-icon" onclick="openWindow('about')">
                                    <img src="https://win98icons.alexmeub.com/icons/png/briefcase-2.png">
                                    <span>ABOUT.TXT</span>
                                </div>
                                <div class="desk-icon" onclick="openWindow('work')">
                                    <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png">
                                    <span>MY_WORK</span>
                                </div>
                            </div>

                            <div id="win-about" class="window" style="top:20px; left:60px;">
                                <div class="titlebar" onmousedown="dragStart(event, 'win-about')">
                                    <span>ABOUT.TXT</span>
                                    <div class="close-btn" onclick="closeWin('win-about')">X</div>
                                </div>
                                <div class="window-body">
                                    <h3 style="margin-bottom:10px">Lydia Yang</h3>
                                    <p>Content Strategist / Social & Editorial Expert.</p>
                                    <hr style="margin:10px 0">
                                    <p>专注于奢侈品与生活方式领域的内容机器搭建。</p>
                                </div>
                            </div>

                            <div id="win-work" class="window" style="top:40px; left:80px;">
                                <div class="titlebar" onmousedown="dragStart(event, 'win-work')">
                                    <span>MY_WORK</span>
                                    <div class="close-btn" onclick="closeWin('win-work')">X</div>
                                </div>
                                <div class="window-body">
                                    <p><b>ASVOFF Fashion Film</b> - Best Chinese Fashion Film awarded.</p>
                                    <p><b>Burberry CN</b> - Dakar Rally Series Strategy.</p>
                                </div>
                            </div>

                        </div>

                        <div class="taskbar">
                            <div class="start-btn">Start</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. 引导动画
    const logLines = [
        "Initializing LydiaOS...",
        "Memory Test: 640K OK",
        "Loading Kernel...",
        "Checking Brand Strategy... OK",
        "Booting Graphic Interface..."
    ];
    let lineIdx = 0;
    function runBoot() {
        const log = document.getElementById('boot-log');
        if(lineIdx < logLines.length) {
            log.innerHTML += "> " + logLines[lineIdx] + "<br>";
            lineIdx++;
            setTimeout(runBoot, 400);
        } else {
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('os-ui').style.display = 'flex';
            }, 800);
        }
    }
    runBoot();

    // 2. 窗口逻辑
    let topZ = 100;
    function openWindow(id) {
        const win = document.getElementById('win-' + id);
        win.style.display = 'flex';
        focusWin(win);
    }
    function closeWin(id) {
        document.getElementById(id).style.display = 'none';
    }
    function focusWin(el) {
        topZ++;
        el.style.zIndex = topZ;
        // 模拟标题栏激活颜色
        document.querySelectorAll('.window').forEach(w => w.style.borderColor = "#fff #808080 #808080 #fff");
        el.style.borderColor = "#fff #444 #444 #fff";
    }

    // 3. 拖拽逻辑
    function dragStart(e, id) {
        const win = document.getElementById(id);
        focusWin(win);
        let shiftX = e.clientX - win.getBoundingClientRect().left;
        let shiftY = e.clientY - win.getBoundingClientRect().top;

        function move(e) {
            win.style.left = e.clientX - shiftX + 'px';
            win.style.top = e.clientY - shiftY + 'px';
        }
        document.onmousemove = move;
        document.onmouseup = () => { document.onmousemove = null; };
    }

    // 4. 时钟
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }, 1000);
</script>

</body>
</html>
