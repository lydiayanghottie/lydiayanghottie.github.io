<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lydia Yang | Archive System</title>
    <style>
        :root {
            --bg: #1a1a1b; /* 视频中的深色背景 */
            --folder-tan: #e4e4de; /* 封面磨砂色 */
            --paper: #fdfdfd;
            /* 视频中的彩色标签系统 */
            --c-red: #d9534f; --c-blue: #4a90e2; --c-green: #5cb85c; --c-yellow: #f0ad4e; --c-purple: #8e44ad;
            --bezier: cubic-bezier(0.23, 1, 0.32, 1); /* Apple 标准丝滑曲线 */
        }

        body {
            background-color: var(--bg);
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: "Helvetica Neue", Helvetica, sans-serif;
            overflow: hidden; color: white;
        }

        /* 档案系统主容器 */
        .archive-system {
            position: relative;
            width: 90%; max-width: 1000px; height: 650px;
            perspective: 2000px;
        }

        /* --- 封面部分 --- */
        .folder-cover {
            position: absolute; inset: 0;
            background: var(--folder-tan);
            border-radius: 4px 20px 20px 4px;
            z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #2a2a2a; transition: all 1s var(--bezier);
            transform-origin: left;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.5);
        }
        .folder-cover.open {
            transform: rotateY(-115deg);
            opacity: 0; pointer-events: none;
        }
        .cover-title { font-size: 32px; font-weight: 900; letter-spacing: 4px; }
        .cover-sub { font-size: 14px; font-weight: 700; opacity: 0.6; margin-top: 10px; }

        /* --- 视频同款彩色导航区 --- */
        .nav-grid {
            position: absolute; top: 80px; left: 0; width: 100%;
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; padding: 20px; box-sizing: border-box;
            transition: transform 0.8s var(--bezier);
            z-index: 50;
        }
        /* 当内容打开时，导航整体上移并缩小 */
        .archive-system.content-open .nav-grid {
            transform: translateY(-120px) scale(0.95);
        }

        .nav-item {
            height: 60px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800; cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .nav-item:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }

        /* --- 内容纸张区 --- */
        .content-viewer {
            position: absolute; top: 180px; left: 20px; right: 20px; bottom: 20px;
            background: var(--paper); border-radius: 8px;
            color: #1a1a1a; padding: 60px; box-sizing: border-box;
            transform: translateY(100px); opacity: 0;
            transition: all 0.8s var(--bezier);
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .archive-system.content-open .content-viewer {
            transform: translateY(0); opacity: 1;
        }

        /* 内容细节 */
        .file-header { font-family: monospace; font-size: 12px; color: #999; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 30px; }
        .file-body h2 { font-size: 42px; margin: 0; letter-spacing: -2px; }
        .file-body p { line-height: 1.8; opacity: 0.8; max-width: 500px; }
        
        .id-clip {
            position: absolute; top: 60px; right: 60px; width: 140px;
            background: white; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: rotate(3deg); border: 1px solid #ddd;
        }
        .id-clip img { width: 100%; grayscale: 0; }

        /* 返回按钮 */
        .back-btn {
            position: absolute; top: 20px; left: 20px; color: white;
            font-size: 12px; cursor: pointer; opacity: 0; transition: 0.5s;
        }
        .archive-system.content-open .back-btn { opacity: 0.5; }
        .back-btn:hover { opacity: 1; }

    </style>
</head>
<body>

<div class="archive-system" id="sys">
    
    <div class="back-btn" onclick="closeFile()">← BACK TO INDEX</div>

    <div class="folder-cover" id="cover" onclick="openFolder()">
        <div class="cover-title">LYDIA YANG</div>
        <div class="cover-sub">CONTENT STRATEGIST / PROJECT FILE</div>
        <div style="position:absolute; bottom:40px; font-size:10px; opacity:0.4;">© 2026 CLASSIFIED ARCHIVE</div>
    </div>

    <div class="nav-grid">
        <div class="nav-item" style="background:var(--c-red)" onclick="openFile('CREATIVE')">Creative</div>
        <div class="nav-item" style="background:var(--c-blue)" onclick="openFile('STRATEGY')">Strategy</div>
        <div class="nav-item" style="background:var(--c-green)" onclick="openFile('DISTRO')">Distro</div>
        <div class="nav-item" style="background:var(--c-purple)" onclick="openFile('ABOUT')">About</div>
    </div>

    <div class="content-viewer" id="viewer">
        <div class="file-header">DOCUMENT_REF: <span id="ref-id">NULL</span></div>
        <div class="file-body">
            <h2 id="file-title">Section Title</h2>
            <p id="file-desc">内容加载中...</p>
        </div>
        
        <div class="id-clip" id="id-card" style="display:none;">
            <img src="me.jpg" alt="Lydia">
            <div style="font-size:9px; font-family:monospace; margin-top:5px;">SUBJECT: LYDIA YANG</div>
        </div>
    </div>

</div>

<script>
    const data = {
        'CREATIVE': { title: 'Visual<br>Production', desc: '基于工业美学的内容生产逻辑。我们关注每一个像素的叙事能力，确保视觉语言与品牌战略高度对齐。', ref: 'CR-001' },
        'STRATEGY': { title: 'Narrative<br>Architecture', desc: '逻辑是创意的骨架。通过深度调研与竞品解构，为品牌量身定制具有攻击性的叙事策略。', ref: 'ST-042' },
        'DISTRO': { title: 'Media<br>Amplification', desc: '算法时代的精准打击。利用多渠道分发矩阵，确保内容在对的时间出现在对的人面前。', ref: 'DI-009' },
        'ABOUT': { title: 'Lydia<br>Yang', desc: 'Lydia 是一位专注于内容策略与数字化叙事的工程师。她喜欢在冷峻的工业质感中寻找人类情感的共鸣点。', ref: 'ID-777' }
    };

    function openFolder() {
        document.getElementById('cover').classList.add('open');
    }

    function openFile(type) {
        const sys = document.getElementById('sys');
        const card = document.getElementById('id-card');
        
        // 1. 触发整体位移动效
        sys.classList.add('content-open');
        
        // 2. 填充内容
        document.getElementById('ref-id').innerText = data[type].ref;
        document.getElementById('file-title').innerHTML = data[type].title;
        document.getElementById('file-desc').innerText = data[type].desc;
        
        // 3. 特殊处理About页的照片
        card.style.display = (type === 'ABOUT') ? 'block' : 'none';
    }

    function closeFile() {
        document.getElementById('sys').classList.remove('content-open');
    }
</script>

</body>
</html>
