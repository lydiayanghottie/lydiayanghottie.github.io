<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYDIA YANG // OPEN_ARCHIVE_1998</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #c5c5c1; 
            --paper: #ffffff;
            --glass: rgba(255, 255, 255, 0.35);
            --orange: #FF5722;
            --curve: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: var(--bg); margin: 0; overflow: hidden; height: 100dvh; font-family: 'Inter', sans-serif; }

        /* 交互区 */
        .click-zone { position: fixed; top: 0; bottom: 0; z-index: 5000; width: 30%; }
        .next { right: 0; } .prev { left: 0; }

        .stage { position: relative; width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; perspective: 3000px; }

        /* --- 3D 书籍容器 (整体水平位移以保持居中感) --- */
        .book-container {
            position: relative; width: 450px; height: 80vh; /* 宽度设为单页宽 */
            transform-style: preserve-3d; transition: transform 1.2s var(--curve);
            transform: translateX(0px); /* 封面态居中 */
        }
        .book-container.is-open { transform: translateX(225px); } /* 展开后向右平移一半宽度，视觉居中 */

        /* --- 封底 (摊开后的底座) --- */
        .v8-back {
            position: absolute; inset: 0; z-index: 5;
            background: var(--glass);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.015' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.2'/%3E%3C/svg%3E");
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 4px;
        }

        /* --- 左右页面系统 --- */
        .page {
            position: absolute; inset: 0; background: var(--paper);
            padding: 60px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 1.2s var(--curve), opacity 0.6s;
            transform-origin: left center; backface-visibility: hidden;
        }

        /* 左页：向左翻转 180 度 */
        .page-left {
            z-index: 20; transform: rotateY(0deg); opacity: 0;
            border-right: 1px solid rgba(0,0,0,0.05);
        }
        .is-open .page-left { transform: rotateY(-180deg); opacity: 1; }

        /* 右页：保持原位或轻微偏移 */
        .page-right { z-index: 10; opacity: 0; }
        .is-open .page-right { opacity: 1; }

        /* 书脊阴影线 */
        .spine-shadow {
            position: absolute; left: 0; top: 0; bottom: 0; width: 30px;
            background: linear-gradient(90deg, rgba(0,0,0,0.08), transparent);
            z-index: 50; pointer-events: none;
        }

        /* --- 封面 (V8 质感) --- */
        .front-cover {
            position: absolute; inset: 0; z-index: 1000;
            background: var(--glass);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.015' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.2'/%3E%3C/svg%3E");
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255,255,255,0.5);
            transform-origin: left center; transition: 1.4s var(--curve);
            display: flex; align-items: center; justify-content: center;
        }
        .front-cover.open { transform: rotateY(-180deg); opacity: 0; pointer-events: none; }

        .cover-plate {
            background: #fff; padding: 25px 60px; font-size: 60px; font-weight: 900;
            color: var(--orange); letter-spacing: -3px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* 书签导航 - 移至右页边缘 */
        .tabs-nav {
            position: absolute; left: 100%; top: 100px; z-index: 2000;
            display: flex; flex-direction: column; gap: 6px;
        }
        .tab {
            width: 80px; height: 32px; background: rgba(0,0,0,0.05);
            font-size: 9px; font-weight: 900; display: flex; align-items: center; 
            padding-left: 10px; border-radius: 0 4px 4px 0; color: #888;
            backdrop-filter: blur(10px); transition: 0.4s var(--curve); cursor: pointer;
        }
        .tab.active { background: #000; color: #fff; width: 110px; }

        /* 内容样式 (左页放标题，右页放描述) */
        .p-idx { font-size: 10px; font-weight: 900; opacity: 0.2; letter-spacing: 3px; margin-bottom: 20px; }
        .p-title { font-size: 55px; font-weight: 900; letter-spacing: -3px; line-height: 0.85; margin: 0; transform: scaleX(-1); text-align: right;} /* 左页翻转了，文字需要反向镜像回来 */
        .p-desc { font-size: 16px; line-height: 1.6; color: #333; margin-top: 20px; }

        @media (max-width: 768px) {
            .book-container { width: 85vw; }
            .book-container.is-open { transform: translateX(0) scale(0.8); } /* 手机端摊开太宽，建议缩小或保持单页感 */
            .p-title { font-size: 35px; }
            .tabs-nav { left: auto; right: 0; bottom: 20px; top: auto; flex-direction: row; transform: translateY(50px); }
        }
    </style>
</head>
<body>

<div class="click-zone prev" onclick="go(-1)"></div>
<div class="click-zone next" onclick="go(1)"></div>

<div class="stage">
    <div class="book-container" id="book">
        
        <div class="v8-back"></div>

        <div class="page page-left" id="page-l">
            <div class="p-title" id="ui-title">SYSTEM</div>
            <div style="position:absolute; bottom:40px; right:40px; opacity:0.1; font-weight:900; transform:scaleX(-1);">V8_ARCHIVE</div>
        </div>

        <div class="page page-right" id="page-r">
            <div class="spine-shadow"></div>
            <div class="p-idx" id="ui-idx">INDEX / 01</div>
            <div class="p-desc" id="ui-desc">...</div>
        </div>

        <nav class="tabs-nav">
            <div class="tab" onclick="jump(1)">01_CREATION</div>
            <div class="tab" onclick="jump(2)">02_STRATEGY</div>
            <div class="tab" onclick="jump(3)">03_DISTRO</div>
            <div class="tab" onclick="jump(4)">04_SCRAPBOOK</div>
            <div class="tab" onclick="jump(5)">05_PROFILE</div>
        </nav>

        <div class="front-cover" id="cover">
            <div class="cover-plate">Works</div>
            <div style="position:absolute; bottom:40px; font-size:9px; letter-spacing:4px; font-weight:700; opacity:0.4;">[ 1998_SERIES_V8 ]</div>
        </div>

    </div>
</div>

<script>
    let step = 0;
    const data = [
        {},
        { i: "INDEX / 01", t: "CONTENT<br>CREATION", d: "Experimental archival aesthetics. High-fidelity visual logic meets industrial minimalism." },
        { i: "INDEX / 02", t: "STRATEGIC<br>LOGIC", d: "Engineering narratives that stick. Defining the intersection of technical rigor and creative intuition." },
        { i: "INDEX / 03", t: "GLOBAL<br>DISTRO", d: "Strategic signal optimization across fragmented networks. Calibrating resonance in the modern era." },
        { i: "INDEX / 04", t: "THE<br>SCRAPBOOK", d: "Raw insights and tactical prototypes. The unfiltered engine room of digital development." },
        { i: "INDEX / 05", t: "IDENTITY<br>PROFILE", d: "Lydia Yang. Content Strategist. Established 1998. Driven by the logic of the perfect blur." }
    ];

    function jump(n) { event.stopPropagation(); step = n; render(); }
    function go(dir) { step = Math.max(0, Math.min(6, step + dir)); render(); }

    function render() {
        const book = document.getElementById('book');
        const cv = document.getElementById('cover');
        const tabs = document.querySelectorAll('.tab');

        if (step === 0) {
            book.classList.remove('is-open');
            cv.classList.remove('open');
        } else if (step === 6) {
            // 封底态
            book.classList.add('is-open');
            cv.classList.add('open');
            document.getElementById('page-l').style.opacity = "0";
            document.getElementById('page-r').style.opacity = "0";
        } else {
            book.classList.add('is-open');
            cv.classList.add('open');
            document.getElementById('page-l').style.opacity = "1";
            document.getElementById('page-r').style.opacity = "1";

            const p = data[step];
            document.getElementById('ui-title').innerHTML = p.t;
            document.getElementById('ui-idx').innerText = p.i;
            document.getElementById('ui-desc').innerText = p.d;

            tabs.forEach((t, i) => t.classList.toggle('active', i + 1 === step));
        }
    }
</script>

</body>
</html>
