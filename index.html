<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>LYDIA_OS // VINTAGE_DESKTOP</title>
    <style>
        :root {
            --win-blue: #008080;
            --win-gray: #c0c0c0;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #1a1a1a; 
            font-family: 'Tahoma', sans-serif;
        }

        /* 第一层：环境（书桌背景） */
        #room {
            width: 100vw; height: 100vh;
            background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=2000') no-repeat center center;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
            transition: transform 1.5s ease-in-out;
        }

        /* 第二层：显示器外壳 */
        #monitor {
            width: 600px; height: 450px;
            background: #d2d2d2;
            border: 15px solid #bebebe;
            border-bottom-width: 40px;
            border-radius: 10px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.2);
            position: relative;
            cursor: pointer;
            transition: all 1s ease-in-out;
        }

        /* 显示器底座 */
        #monitor::after {
            content: ""; position: absolute; bottom: -80px; left: 25%;
            width: 50%; height: 40px; background: #aaa;
            clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
        }

        /* 屏幕内部（系统层） */
        #screen {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px #000;
        }

        /* 第三层：Windows 桌面 */
        #windows-desktop {
            width: 100%; height: 100%;
            background: var(--win-blue);
            display: none; /* 初始黑屏 */
            flex-direction: column;
        }

        /* 桌面图标 */
        .desktop-icons {
            padding: 20px; display: grid;
            grid-template-columns: repeat(auto-fill, 70px); grid-gap: 20px;
        }
        .icon {
            display: flex; flex-direction: column; align-items: center;
            color: white; font-size: 10px; text-align: center;
        }
        .icon img { width: 32px; margin-bottom: 5px; }

        /* 真实的 3D 窗口 */
        .window {
            position: absolute; width: 280px; background: var(--win-gray);
            border: 2px solid; border-color: #fff #808080 #808080 #fff;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            display: none; flex-direction: column; z-index: 100;
        }
        .title-bar {
            background: #000080; color: white; padding: 3px 6px;
            display: flex; justify-content: space-between; font-size: 11px;
            cursor: move;
        }
        .window-body {
            background: white; margin: 2px; padding: 10px;
            border: 2px solid; border-color: #808080 #fff #fff #808080;
            height: 150px; font-size: 12px; color: black;
        }

        /* 任务栏 */
        #taskbar {
            margin-top: auto; height: 30px; background: var(--win-gray);
            border-top: 2px solid #fff; display: flex; align-items: center; padding: 2px;
        }
        .start-btn {
            border: 2px solid; border-color: #fff #808080 #808080 #fff;
            padding: 2px 8px; font-weight: bold; font-size: 11px;
        }

        /* 放大进入系统的动画 */
        .zoom-in { transform: scale(3); }
        .monitor-full { width: 100vw !important; height: 100vh !important; border: 0 !important; border-radius: 0 !important; }

    </style>
</head>
<body>

    <div id="room">
        <div id="monitor" onclick="bootSystem()">
            <div id="screen">
                <div id="boot-text" style="color: #0f0; padding: 20px; font-size: 12px; display: none;">
                    Verifying DMI Pool Data ...........<br>
                    Boot from CD :<br>
                    Starting Windows 98...
                </div>
                
                <div id="windows-desktop">
                    <div class="desktop-icons">
                        <div class="icon" onclick="openWindow('My Documents', 'Welcome to Lydia\'s archive.')">
                            <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png">
                            <span>My Documents</span>
                        </div>
                        <div class="icon" onclick="openWindow('System', 'All systems operational.')">
                            <img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-4.png">
                            <span>My Computer</span>
                        </div>
                    </div>

                    <div id="app-window" class="window">
                        <div class="title-bar">
                            <span id="win-title">Folder</span>
                            <button onclick="closeWindow()" style="height:14px; width:16px; font-size:9px;">X</button>
                        </div>
                        <div class="window-body" id="win-content"></div>
                    </div>

                    <div id="taskbar">
                        <div class="start-btn">Start</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function bootSystem() {
            const monitor = document.getElementById('monitor');
            const bootText = document.getElementById('boot-text');
            const desktop = document.getElementById('windows-desktop');

            // 1. 视角拉近动画
            monitor.onclick = null; // 防止重复点击
            monitor.classList.add('monitor-full');
            document.getElementById('room').style.transform = "scale(1.2)";

            // 2. 模拟开机自检
            setTimeout(() => {
                bootText.style.display = 'block';
            }, 500);

            // 3. 进入系统
            setTimeout(() => {
                bootText.style.display = 'none';
                desktop.style.display = 'flex';
            }, 2500);
        }

        function openWindow(title, content) {
            const win = document.getElementById('app-window');
            document.getElementById('win-title').innerText = title;
            document.getElementById('win-content').innerText = content;
            win.style.display = 'flex';
            win.style.top = "50px";
            win.style.left = "50px";
        }

        function closeWindow() {
            document.getElementById('app-window').style.display = 'none';
        }
    </script>
</body>
</html>
