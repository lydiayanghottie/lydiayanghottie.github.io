<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYDIA YANG // ORANGE_WORKS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #c5c5c1; 
            --paper: #ffffff;
            --glass: rgba(255, 255, 255, 0.38);
            --orange: #FF5722;
            --apple-curve: cubic-bezier(0.2, 0, 0, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: var(--bg); margin: 0; overflow: hidden; height: 100dvh; font-family: 'Inter', sans-serif; }

        /* 基础点击翻页区（避开右侧书签） */
        .nav-zone { position: fixed; top: 0; bottom: 0; z-index: 50; width: 40%; }
        .next-z { right: 0; } .prev-z { left: 0; }

        .stage { position: relative; width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; perspective: 2500px; }

        .book-container {
            position: relative; width: 90%; max-width: 900px; height: 85vh;
            transform-style: preserve-3d; transition: transform 1.2s var(--apple-curve);
        }

        /* --- 质感层：V8 原生噪点磨砂 --- */
        .acrylic {
            position: absolute; inset: 0;
            background: var(--glass);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
            backdrop-filter: blur(35px) saturate(120%); -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 4px;
            transform-origin: left center; transition: 1.2s var(--apple-curve);
        }

        /* 封面 */
        .front-cover { z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .front-cover.open { transform: rotateY(-108deg); opacity: 0; pointer-events: none; }

        /* 封底 (仅最后步显示) */
        .back-cover { z-index: 5; display: none; align-items: flex-end; justify-content: flex-end; padding: 40px; }
        .back-cover.visible { display: flex; }

        /* 右下角微型条形码 */
        .mini-barcode {
            display: flex; flex-direction: column; align-items: flex-end;
            mix-blend-mode: multiply; opacity: 0.7; transform: scale(0.8);
        }
        .barcode-lines {
            width: 150px; height: 40px;
            background: repeating-linear-gradient(90deg, #000, #000 1.5px, transparent 1.5px, transparent 4px);
        }
        .barcode-label { font-family: monospace; font-size: 11px; font-weight: 900; letter-spacing: 4px; margin-top: 5px; color: #000; }

        /* 封面橘色 WORKS */
        .cover-label {
            background: #fff; padding: 25px 60px; font-size: 65px; font-weight: 900;
            letter-spacing: -4px; box-shadow: 0 25px 60px rgba(0,0,0,0.1);
            color: var(--orange); /* 橘色修改 */
        }

        /* 右上角照片别针 */
        .photo-wrap {
            position: absolute; right: 40px; top: 40px; width: 160px;
            background: #fff; padding: 10px 10px 30px 10px;
            box-shadow: 10px 15px 30px rgba(0,0,0,0.15); transform: rotate(2deg);
        }
        .photo-wrap img { width: 100%; display: block; }
        .pin {
            position: absolute; right: 20px; top: -12px; width: 14px; height: 45px;
            border: 2.5px solid #999; border-radius: 10px; z-index: 1100;
        }
        .pin::after {
            content: ""; position: absolute; top: 5px; left: 2.5px;
            width: 6px; height: 30px; border: 2.2px solid #bbb; border-top: none; border-radius: 0 0 5px 5px;
        }

        /* 纸张层 */
        .paper {
            position: absolute; inset: 10px; background: var(--paper); z-index: 100;
            box-shadow: 0 10px 50px rgba(0,0,0,0.1); padding: 100px 80px;
            opacity: 0; transform: translateZ(-20px); transition: 0.6s var(--apple-curve);
            pointer-events: none;
        }
        .paper.active { opacity: 1; transform: translateZ(0); pointer-events: auto; }

        /* 独立书签交互区 (层级最高) */
        .side-tabs {
            position: absolute; left: 100%; top: 120px; z-index: 2000;
            display: flex; flex-direction: column; gap: 6px; transform: translateX(-15px);
        }
        .tab-btn {
            width: 85px; height: 34px; background: rgba(0,0,0,0.06);
            font-size: 9px; font-weight: 900; display: flex; align-items: center; 
            padding-left: 12px; border-radius: 0 4px 4px 0; color: #888;
            backdrop-filter: blur(10px); transition: 0.3s var(--apple-curve);
            cursor: pointer;
        }
        .tab-btn:hover { background: var(--orange); color: #fff; width: 110px; }
        .tab-btn.active { background: #000; color: #fff; width: 115px; transform: translateX(5px); }

        /* 文字内容 */
        .idx { font-size: 10px; font-weight: 900; opacity: 0.2; letter-spacing: 4px; margin-bottom: 20px; }
        .title { font-size: clamp(35px, 7vw, 70px); font-weight: 900; letter-spacing: -3px; line-height: 0.9; margin: 0; }
        .desc { font-size: 18px; line-height: 1.5; color: #333; margin-top: 40px; max-width: 450px; }

        @media (max-width: 768px) {
            .side-tabs { left: auto; right: 0; transform: translateX(70px); bottom: 50px; top: auto; }
            .side-tabs:hover { transform: translateX(0); }
            .cover-label { font-size: 45px; padding: 15px 35px; }
            .photo-wrap { width: 120px; right: 20px; top: 20px; }
        }
    </style>
</head>
<body>

<div class="nav-zone prev-z" onclick="stepMove(-1)"></div>
<div class="nav-zone next-z" onclick="stepMove(1)"></div>

<div class="stage">
    <div class="book-container">
        
        <div class="acrylic back-cover" id="back">
            <div class="mini-barcode">
                <div class="barcode-lines"></div>
                <div class="barcode-label">MADEINDALI</div>
            </div>
        </div>

        <div class="paper" id="paper">
            <div class="idx" id="v-idx">INDEX / 01</div>
            <h2 class="title" id="v-title">SYSTEM_INIT</h2>
            <p class="desc" id="v-desc">...</p>
        </div>

        <nav class="side-tabs">
            <div class="tab-btn" onclick="jumpTo(1)">01_CREATION</div>
            <div class="tab-btn" onclick="jumpTo(2)">02_STRATEGY</div>
            <div class="tab-btn" onclick="jumpTo(3)">03_DISTRO</div>
            <div class="tab-btn" onclick="jumpTo(4)">04_SCRAPBOOK</div>
            <div class="tab-btn" onclick="jumpTo(5)">05_PROFILE</div>
        </nav>

        <div class="acrylic front-cover" id="cover">
            <div class="pin"></div>
            <div class="photo-wrap">
                <img src="me.jpg" alt="Lydia Yang">
            </div>
            <div class="cover-label">WORKS</div>
            <div style="position:absolute; bottom:40px; font-size:9px; letter-spacing:5px; font-weight:700; opacity:0.4;">
                [ ARCHIVE_V8_ORANGE ]
            </div>
        </div>

    </div>
</div>

<script>
    let currentStep = 0; // 0:Cover, 1-5:Pages, 6:Back
    const contentData = [
        {},
        { i: "INDEX / 01", t: "CONTENT<br>CREATION", d: "High-fidelity visual systems and experimental archives. Merging industrial precision with creative fluidity." },
        { i: "INDEX / 02", t: "STRATEGIC<br>LOGIC", d: "Engineering narratives that survive the noise. Logic is the invisible architecture of design." },
        { i: "INDEX / 03", t: "GLOBAL<br>DISTRO", d: "Strategic signal optimization across fragmented networks. Calibrating resonance in the modern era." },
        { i: "INDEX / 04", t: "SCRAPBOOK", d: "Raw insights and tactical prototypes. The foundational engine of the 2026 system." },
        { i: "INDEX / 05", t: "IDENTITY", d: "Lydia Yang. Strategist. Established 1998. Driven by the logic of the perfect blur." }
    ];

    // 跳转函数：任意标签点击跳转
    function jumpTo(n) {
        event.stopPropagation();
        currentStep = n;
        updateDisplay();
    }

    // 翻页函数
    function stepMove(dir) {
        currentStep = Math.max(0, Math.min(6, currentStep + dir));
        updateDisplay();
    }

    function updateDisplay() {
        const cover = document.getElementById('cover');
        const paper = document.getElementById('paper');
        const back = document.getElementById('back');
        const tabs = document.querySelectorAll('.tab-btn');

        // 1. 标签状态
        tabs.forEach((t, i) => t.classList.toggle('active', i + 1 === currentStep));

        // 2. 封面逻辑
        if (currentStep === 0) {
            cover.classList.remove('open');
            paper.classList.remove('active');
            back.classList.remove('visible');
        } 
        // 3. 封底逻辑 (仅最后一步可见)
        else if (currentStep === 6) {
            cover.classList.add('open');
            paper.classList.remove('active');
            back.classList.add('visible');
        } 
        // 4. 中间页面逻辑
        else {
            cover.classList.add('open');
            back.classList.remove('visible'); // 隐藏封底，防止穿透
            paper.classList.add('active');
            
            const p = contentData[currentStep];
            document.getElementById('v-idx').innerText = p.i;
            document.getElementById('v-title').innerHTML = p.t;
            document.getElementById('v-desc').innerText = p.d;
        }
    }
</script>
</body>
</html>
