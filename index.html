<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lydia Yang | Digital Archive v3</title>
    <style>
        :root {
            --bg: #141415;
            --frosted: rgba(220, 220, 215, 0.85); /* 磨砂塑料色 */
            --paper: #fefefe;
            /* 莫兰迪色标 */
            --c1: #d88c8c; --c2: #8ca3d8; --c3: #8cd8a3; --c4: #d8c28c; --c5: #b18cd8;
            --smooth: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg);
            margin: 0; overflow: hidden;
            height: 100dvh; display: flex; justify-content: center; align-items: center;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        /* --- 1. 高级自定义鼠标 --- */
        #cursor {
            width: 50px; height: 50px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            mix-blend-mode: difference; /* 颜色取反，保证在黑白背景都清晰 */
            transition: transform 0.1s ease-out;
        }
        #cursor::before { content: ""; width: 2px; height: 10px; background: white; position: absolute; }
        #cursor::after { content: ""; width: 10px; height: 2px; background: white; position: absolute; }

        .stage {
            position: relative;
            width: 100%; max-width: 1000px; height: 90vh;
            display: flex; flex-direction: column;
        }

        /* --- 2. 磨砂半透封面 --- */
        .cover {
            position: absolute; inset: 0;
            background: var(--frosted);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); /* 磨砂核心 */
            z-index: 1000; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #1a1a1a; transition: all 1s var(--smooth);
            box-shadow: 0 50px 100px rgba(0,0,0,0.4), inset 0 0 40px rgba(255,255,255,0.4);
            /* 增加噪点纹理 */
            background-image: url("https://www.transparenttextures.com/patterns/p6.png"); 
        }
        .cover.hide { transform: translateY(-110%) rotateX(10deg); opacity: 0; pointer-events: none; }
        
        .cover .mj-logo { font-size: 40px; font-weight: 900; letter-spacing: -1px; line-height: 0.9; }
        .cover .mj-sub { font-size: 11px; font-weight: 700; margin-top: 15px; letter-spacing: 4px; opacity: 0.6; }

        /* --- 3. 物理标签导航 --- */
        .tab-nav {
            position: absolute; top: 40px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 4px;
            padding: 0 15px; z-index: 500;
        }

        .tab {
            flex: 1; height: 40px;
            border-radius: 6px 6px 0 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 900; color: white;
            text-transform: uppercase; cursor: pointer;
            transition: 0.3s var(--smooth); opacity: 0.8;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
        }
        .tab:hover, .tab.active { opacity: 1; height: 55px; transform: translateY(-5px); }

        /* --- 4. 纸张内容 --- */
        .file-content {
            position: absolute; top: 90px; left: 10px; right: 10px; bottom: 20px;
            background: var(--paper); border-radius: 8px;
            transform: translateY(120vh); transition: transform 0.8s var(--smooth);
            z-index: 400; padding: 50px; color: #1a1a1a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }
        .stage.active .file-content { transform: translateY(0); }

        .doc-id { font-family: monospace; font-size: 10px; color: #888; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 30px; }
        .doc-title { font-size: 42px; font-weight: 900; margin: 0; letter-spacing: -2px; line-height: 1; }
        .doc-text { font-size: 16px; line-height: 1.7; margin-top: 30px; max-width: 480px; }

        .back-trigger {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            font-size: 9px; font-weight: bold; color: #ccc; cursor: pointer;
        }

        /* --- 5. 竖屏 (Mobile) 深度优化 --- */
        @media (max-width: 600px) {
            .tab-nav { 
                display: grid; grid-template-columns: repeat(3, 1fr); 
                top: 20px; gap: 8px;
            }
            .tab { border-radius: 6px; height: 35px; }
            .file-content { padding: 30px; top: 120px; }
            .doc-title { font-size: 32px; }
            #cursor { display: none; } /* 移动端隐藏自定义鼠标 */
        }
    </style>
</head>
<body>

<div id="cursor"></div>

<div class="stage" id="stage">
    
    <div class="cover" id="cover" onclick="openArchive()">
        <div class="mj-logo">LYDIA YANG</div>
        <div class="mj-sub">CONTENT STRATEGIST</div>
        <div style="position:absolute; bottom:40px; font-size:9px; opacity:0.4; letter-spacing:2px;">[ CLICK TO OPEN FILE ]</div>
    </div>

    <nav class="tab-nav">
        <div class="tab" id="t1" style="background:var(--c1)" onclick="loadFile(1)">Creation</div>
        <div class="tab" id="t2" style="background:var(--c2)" onclick="loadFile(2)">Strategy</div>
        <div class="tab" id="t3" style="background:var(--c3)" onclick="loadFile(3)">Distro</div>
        <div class="tab" id="t4" style="background:var(--c4)" onclick="loadFile(4)">Notes</div>
        <div class="tab" id="t5" style="background:var(--c5)" onclick="loadFile(5)">About</div>
    </nav>

    <div class="file-content">
        <div class="back-trigger" onclick="closeArchive()">CLOSE / RETURN</div>
        <div class="doc-id">FILE_REF: <span id="f-ref">MJ-000</span></div>
        <h1 class="doc-title" id="f-title">SELECT FILE</h1>
        <p class="doc-text" id="f-desc">请点击上方标签以提取档案信息内容。</p>
        
        <div id="f-about" style="display:none; margin-top:30px;">
            <div style="width:140px; background:white; padding:10px; box-shadow:0 10px 30px rgba(0,0,0,0.1); transform:rotate(-2deg); border:1px solid #ddd;">
                <img src="me.jpg" style="width:100%;" alt="Lydia">
            </div>
        </div>
    </div>

</div>

<script>
    // 鼠标跟随效果
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', (e) => {
        cursor.style.transform = `translate(${e.clientX - 25}px, ${e.clientY - 25}px)`;
    });

    const archive = {
        1: { title: "Visual<br>Language", ref: "CR-808", desc: "构建具有工业精密感的内容视觉体系。我们强调留白、网格与极致的文字排版逻辑。" },
        2: { title: "Narrative<br>Logic", ref: "ST-412", desc: "策略是内容背后的隐形框架。通过解构媒介规律，为品牌定制具有穿透力的叙事方案。" },
        3: { title: "Global<br>Distro", ref: "DI-105", desc: "在算法时代重塑分发协议。让精准的内容通过最优路径抵达目标心智。" },
        4: { title: "Draft<br>Notes", ref: "NO-003", desc: "关于未来交互趋势、物理拟物化设计以及数字化情感价值的碎碎念。" },
        5: { title: "Subject:<br>Lydia Yang", ref: "ID-999", desc: "Lydia 是一位追求物理触感与数字逻辑完美统一的内容策略工程师。她热衷于将复杂信息转化为极简且深刻的视觉档案。" }
    };

    function openArchive() {
        document.getElementById('cover').classList.add('hide');
        setTimeout(() => loadFile(1), 600);
    }

    function loadFile(id) {
        document.getElementById('stage').classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t' + id).classList.add('active');

        const item = archive[id];
        document.getElementById('f-title').innerHTML = item.title;
        document.getElementById('f-ref').innerText = item.ref;
        document.getElementById('f-desc').innerText = item.desc;
        
        document.getElementById('f-about').style.display = (id === 5) ? 'block' : 'none';
    }

    function closeArchive() {
        document.getElementById('cover').classList.remove('hide');
        document.getElementById('stage').classList.remove('active');
    }
</script>

</body>
</html>
