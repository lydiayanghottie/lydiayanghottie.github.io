<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lydia Yang</title>
    <style>
        /* 宝蓝色背景 */
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #0047AB; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
        }

        .greeting-box {
            font-size: 3rem;
            font-weight: bold;
            height: 80px; 
        }

        /* 动画效果 */
        .fade-in-out {
            animation: fadeInOut 3s infinite;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        .name {
            font-size: 1.5rem;
            margin-top: 20px;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        /* 照片样式：圆形且带一点白边 */
        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.3);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="greeting" class="greeting-box">你好</div>
        
        <img src="me.jpg" class="profile-pic" alt="Lydia Yang">

        <div class="name">我是 Lydia Yang</div>
    </div>

    <script>
        const greetings = ["你好", "Hello", "Bonjour"];
        let currentIndex = 0;
        const greetingElement = document.getElementById("greeting");

        function updateGreeting() {
            greetingElement.textContent = greetings[currentIndex];
            greetingElement.classList.remove("fade-in-out");
            void greetingElement.offsetWidth; 
            greetingElement.classList.add("fade-in-out");
            currentIndex = (currentIndex + 1) % greetings.length;
        }

        setInterval(updateGreeting, 3000);
        updateGreeting(); 
    </script>
</body>
</html>
