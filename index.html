<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYDIA YANG // SYSTEM 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --paper: #f7f7f7;
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.02);
            --line: rgba(255, 255, 255, 0.1);
            --bezier: cubic-bezier(0.8, 0, 0.1, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; cursor: none; }
        body { background-color: var(--bg); margin: 0; overflow: hidden; height: 100dvh; font-family: 'Inter', sans-serif; color: white; }

        /* --- 极致锋利准心 --- */
        #cursor {
            width: 30px; height: 30px; position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: difference; display: flex; align-items: center; justify-content: center;
        }
        #cursor::before { content: ""; position: absolute; width: 100%; height: 0.5px; background: white; }
        #cursor::after { content: ""; position: absolute; width: 0.5px; height: 100%; background: white; }

        .click-area { position: fixed; top: 0; bottom: 0; z-index: 5000; width: 50%; }
        .next { right: 0; } .prev { left: 0; }

        /* --- 主容器 --- */
        .stage { position: relative; width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* --- 1. 磨砂封面 (液态玻璃感) --- */
        .cover {
            position: absolute; width: 90%; height: 85vh; z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(100px) saturate(150%);
            -webkit-backdrop-filter: blur(100px) saturate(150%);
            border: 0.5px solid var(--line);
            border-radius: 2px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 1.2s var(--bezier);
            box-shadow: inset 0 0 100px rgba(255,255,255,0.02);
        }
        .cover.hide { transform: translateX(-120%) skewX(-5deg); opacity: 0; pointer-events: none; }

        .cover-title {
            font-size: clamp(50px, 15vw, 160px); font-weight: 900; letter-spacing: -0.07em;
            line-height: 0.8; margin: 0; filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }
        .cover-tag { margin-top: 50px; font-size: 10px; letter-spacing: 0.8em; opacity: 0.4; text-transform: uppercase; }

        /* --- 2. 锋利导航 (Apple/MJ Style) --- */
        .nav-system {
            position: absolute; right: 5%; top: 50%; transform: translateY(-50%);
            z-index: 600; display: flex; flex-direction: column; gap: 40px;
        }
        .nav-btn {
            display: flex; align-items: center; gap: 15px; opacity: 0.15; transition: 0.5s var(--bezier);
        }
        .nav-btn span { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }
        .nav-btn .line { width: 0px; height: 1px; background: white; transition: 0.5s var(--bezier); }
        .nav-btn.active { opacity: 1; }
        .nav-btn.active .line { width: 40px; }

        /* --- 3. 内部纸张 (堆叠感) --- */
        .content-layer {
            position: absolute; width: 85%; height: 80vh;
            background: var(--paper); z-index: 100;
            transform: translateY(110vh); transition: 1s var(--bezier);
            padding: 80px; color: #000;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .stage.active .content-layer { transform: translateY(0); }

        .page-index { font-size: 10px; font-weight: 900; letter-spacing: 0.3em; opacity: 0.2; }
        .page-title { font-size: clamp(30px, 6vw, 80px); font-weight: 900; letter-spacing: -0.04em; margin: 20px 0; line-height: 0.9; }
        .page-desc { font-size: 18px; line-height: 1.4; max-width: 480px; font-weight: 400; color: #222; }

        /* --- 4. 宝丽来 + 回形针 (侧夹) --- */
        .polaroid-frame {
            position: absolute; bottom: 80px; right: 80px;
            width: 240px; background: white; padding: 15px 15px 50px 15px;
            box-shadow: 20px 30px 60px rgba(0,0,0,0.15); transform: rotate(2deg);
        }
        .polaroid-frame img { width: 100%; display: block; }
        
        .paper-clip {
            position: absolute; left: -12px; top: 50px;
            width: 15px; height: 50px; border: 2px solid #aaa; border-radius: 12px;
            background: transparent; z-index: 10;
        }
        .paper-clip::after {
            content: ""; position: absolute; top: 5px; left: 2px;
            width: 7px; height: 35px; border: 2px solid #ccc; border-top: none; border-radius: 0 0 6px 6px;
        }

        /* --- 5. 封底便利贴 --- */
        .footer-msg {
            position: absolute; bottom: 100px; left: 80px;
            font-size: 40px; font-weight: 300; letter-spacing: -0.03em; color: #ddd;
            opacity: 0; transition: 1.5s;
        }
        .stage.final .footer-msg { opacity: 1; }

        @media (max-width: 768px) {
            .content-layer { padding: 40px; width: 92%; }
            .nav-system { right: 20px; }
            .nav-btn span { font-size: 7px; }
            .cover-title { font-size: 70px; }
            #cursor { display: none; }
        }
    </style>
</head>
<body>

<div id="cursor"></div>

<div class="click-area prev" onclick="changePage(-1)"></div>
<div class="click-area next" onclick="changePage(1)"></div>

<div class="stage" id="stage">
    
    <div class="cover" id="cover">
        <h1 class="cover-title">LYDIA<br>YANG</h1>
        <div class="cover-tag">// ARCHIVE SYSTEM v5.0</div>
    </div>

    <nav class="nav-system">
        <div class="nav-btn" id="n1"><div class="line"></div><span>01_Creation</span></div>
        <div class="nav-btn" id="n2"><div class="line"></div><span>02_Strategy</span></div>
        <div class="nav-btn" id="n3"><div class="line"></div><span>03_Distro</span></div>
        <div class="nav-btn" id="n4"><div class="line"></div><span>04_Scrapbook</span></div>
        <div class="nav-btn" id="n5"><div class="line"></div><span>05_Identity</span></div>
    </nav>

    <div class="content-layer" id="content">
        <div>
            <div class="page-index" id="p-idx">INDEX / 001</div>
            <h2 class="page-title" id="p-title">LOADING_SYSTEM</h2>
            <p class="page-desc" id="p-desc">Deep-logic strategy meets high-fidelity creative execution.</p>
        </div>

        <div class="footer-msg" id="f-msg">NICE TO MEET YOU.</div>

        <div class="polaroid-frame" id="p-frame" style="display:none;">
            <div class="paper-clip"></div>
            <img src="me.jpg" alt="Lydia Yang">
            <div style="margin-top:20px; font-family:monospace; font-size:9px; opacity:0.3; letter-spacing:2px;">LY_SYS_ID.RAW</div>
        </div>
    </div>

</div>

<script>
    let step = 0; // 0: Cover, 1-5: Pages, 6: End
    const cursor = document.getElementById('cursor');

    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX - 15 + 'px';
        cursor.style.top = e.clientY - 15 + 'px';
    });

    const data = [
        {},
        { idx: "INDEX / 01", title: "Content<br>Creation", desc: "Forging visual identities through minimalist rigor. My approach is defined by the intersection of industrial precision and digital fluidity." },
        { idx: "INDEX / 02", title: "Strategic<br>Logic", desc: "Narratives that don't just speak—they stick. Engineering the 'why' behind every pixel to ensure long-term brand resonance." },
        { idx: "INDEX / 03", title: "Global<br>Distro", desc: "Signal optimization across fragmented networks. Ensuring the core message remains undisturbed by digital static." },
        { idx: "INDEX / 04", title: "Digital<br>Scrapbook", desc: "A raw feed of evolving ideas, sketches, and tactical prototypes. The engine room of creative development." },
        { idx: "INDEX / 05", title: "Lydia<br>Yang", desc: "Content Strategist. Logic-driven. Inspired by the perfect blur. Currently building in the 2026 digital landscape." }
    ];

    function changePage(dir) {
        step = Math.max(0, Math.min(6, step + dir));
        render();
    }

    function render() {
        const s = document.getElementById('stage');
        const c = document.getElementById('cover');
        const ph = document.getElementById('p-frame');
        const msg = document.getElementById('f-msg');

        // 封面逻辑
        step === 0 ? c.classList.remove('hide') : c.classList.add('hide');

        // 内容与导航逻辑
        if (step >= 1 && step <= 5) {
            s.classList.add('active');
            s.classList.remove('final');
            document.getElementById('p-idx').innerText = data[step].idx;
            document.getElementById('p-title').innerHTML = data[step].title;
            document.getElementById('p-desc').innerText = data[step].desc;
            
            ph.style.display = (step === 5) ? "block" : "none";
            msg.style.display = "none";

            document.querySelectorAll('.nav-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i + 1 === step);
            });
        } else if (step === 6) {
            s.classList.remove('active');
            s.classList.add('final');
            msg.style.display = "block";
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        } else {
            s.classList.remove('active');
        }
    }
</script>
</body>
</html>
