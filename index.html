<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYDIA YANG // V8_GRAIN_WORKS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #c5c5c1; 
            --paper: #ffffff;
            --glass: rgba(255, 255, 255, 0.4); /* 增加白度，增强遮盖力 */
            --orange: #FF5722;
            --apple-curve: cubic-bezier(0.2, 0, 0, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: var(--bg); margin: 0; overflow: hidden; height: 100dvh; font-family: 'Inter', sans-serif; }

        /* 全局翻页区域 */
        .nav-zone { position: fixed; top: 0; bottom: 0; z-index: 50; width: 35%; }
        .next-z { right: 0; } .prev-z { left: 0; }

        .stage { position: relative; width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; perspective: 2500px; }

        .book-container {
            position: relative; width: 90%; max-width: 900px; height: 85vh;
            transform-style: preserve-3d; transition: transform 1.2s var(--apple-curve);
        }

        /* --- V8 核心：粗颗粒马赛克压克力 --- */
        .v8-mosaic {
            position: absolute; inset: 0;
            background: var(--glass);
            /* V8 关键：低频湍流噪声实现马赛克效果 */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.02' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E");
            background-blend-mode: soft-light; /* 模拟噪点压在材料上的光感 */
            backdrop-filter: blur(35px) saturate(110%);
            -webkit-backdrop-filter: blur(35px) saturate(110%);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 4px;
            transform-origin: left center; transition: 1.2s var(--apple-curve);
        }

        /* 封面 */
        .front-cover { z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .front-cover.open { transform: rotateY(-110deg); opacity: 0; pointer-events: none; }

        /* 封底 (最后步显示) */
        .back-cover { z-index: 5; display: none; align-items: flex-end; justify-content: flex-end; padding: 40px; }
        .back-cover.visible { display: flex; }

        /* 橘色 WORKS */
        .works-label {
            background: #fff; padding: 25px 60px; font-size: 65px; font-weight: 900;
            letter-spacing: -4px; box-shadow: 0 25px 60px rgba(0,0,0,0.1);
            color: var(--orange);
        }

        /* 别针照片 */
        .pinned-photo {
            position: absolute; right: 40px; top: 40px; width: 160px;
            background: #fff; padding: 10px 10px 30px 10px;
            box-shadow: 10px 15px 30px rgba(0,0,0,0.15); transform: rotate(2deg);
        }
        .pinned-photo img { width: 100%; display: block; }
        .paper-clip {
            position: absolute; right: 20px; top: -12px; width: 14px; height: 45px;
            border: 2.5px solid #999; border-radius: 10px; z-index: 1100;
        }
        .paper-clip::after {
            content: ""; position: absolute; top: 5px; left: 2.5px;
            width: 6px; height: 30px; border: 2.2px solid #bbb; border-top: none; border-radius: 0 0 5px 5px;
        }

        /* 封底条形码 */
        .barcode-sticker {
            display: flex; flex-direction: column; align-items: flex-end;
            mix-blend-mode: multiply; opacity: 0.7; transform: scale(0.85);
        }
        .lines {
            width: 160px; height: 45px;
            background: repeating-linear-gradient(90deg, #000, #000 1.5px, transparent 1.5px, transparent 4px);
        }
        .b-id { font-family: monospace; font-size: 11px; font-weight: 900; letter-spacing: 4px; margin-top: 5px; color: #000; }

        /* 纸张 */
        .paper-page {
            position: absolute; inset: 10px; background: var(--paper); z-index: 100;
            box-shadow: 0 10px 50px rgba(0,0,0,0.12); padding: 100px 80px;
            opacity: 0; transform: translateZ(-30px); transition: 0.7s var(--apple-curve);
            pointer-events: none;
        }
        .paper-page.active { opacity: 1; transform: translateZ(0); pointer-events: auto; }

        /* 独立标签跳转 */
        .tabs-nav {
            position: absolute; left: 100%; top: 120px; z-index: 2000;
            display: flex; flex-direction: column; gap: 6px; transform: translateX(-15px);
        }
        .nav-btn {
            width: 90px; height: 36px; background: rgba(0,0,0,0.06);
            font-size: 9px; font-weight: 900; display: flex; align-items: center; 
            padding-left: 14px; border-radius: 0 4px 4px 0; color: #888;
            backdrop-filter: blur(10px); transition: 0.3s var(--apple-curve);
            cursor: pointer;
        }
        .nav-btn:hover { background: var(--orange); color: #fff; width: 115px; }
        .nav-btn.active { background: #000; color: #fff; width: 120px; transform: translateX(5px); }

        /* 内容 */
        .ui-idx { font-size: 10px; font-weight: 900; opacity: 0.2; letter-spacing: 5px; margin-bottom: 25px; }
        .ui-title { font-size: clamp(35px, 7vw, 75px); font-weight: 900; letter-spacing: -4px; line-height: 0.85; margin: 0; }
        .ui-desc { font-size: 18px; line-height: 1.5; color: #333; margin-top: 45px; max-width: 480px; }

        @media (max-width: 768px) {
            .tabs-nav { left: auto; right: 0; transform: translateX(75px); bottom: 60px; top: auto; }
            .tabs-nav:hover { transform: translateX(0); }
            .works-label { font-size: 45px; padding: 15px 35px; }
            .pinned-photo { width: 120px; right: 20px; top: 20px; }
        }
    </style>
</head>
<body>

<div class="nav-zone prev-z" onclick="stepMove(-1)"></div>
<div class="nav-zone next-z" onclick="stepMove(1)"></div>

<div class="stage">
    <div class="book-container">
        
        <div class="v8-mosaic back-cover" id="back">
            <div class="barcode-sticker">
                <div class="lines"></div>
                <div class="b-id">MADEINDALI // 1998</div>
            </div>
        </div>

        <div class="paper-page" id="paper">
            <div class="ui-idx" id="v-idx">ARCHIVE / 01</div>
            <h2 class="ui-title" id="v-title">...</h2>
            <p class="ui-desc" id="v-desc">...</p>
        </div>

        <nav class="tabs-nav">
            <div class="nav-btn" onclick="jumpTo(1)">01_CREATION</div>
            <div class="nav-btn" onclick="jumpTo(2)">02_STRATEGY</div>
            <div class="nav-btn" onclick="jumpTo(3)">03_DISTRO</div>
            <div class="nav-btn" onclick="jumpTo(4)">04_SCRAPBOOK</div>
            <div class="nav-btn" onclick="jumpTo(5)">05_PROFILE</div>
        </nav>

        <div class="v8-mosaic front-cover" id="cover">
            <div class="paper-clip"></div>
            <div class="pinned-photo">
                <img src="me.jpg" alt="Lydia Yang">
            </div>
            <div class="works-label">WORKS</div>
            <div style="position:absolute; bottom:40px; font-size:9px; letter-spacing:5px; font-weight:700; opacity:0.4;">
                [ ARCHIVE_V8_GRAIN_ works ]
            </div>
        </div>

    </div>
</div>

<script>
    let step = 0; 
    const data = [
        {},
        { i: "ARCHIVE / 01", t: "CONTENT<br>CREATION", d: "Experimental archival aesthetics. High-fidelity visual logic meets industrial minimalism." },
        { i: "ARCHIVE / 02", t: "STRATEGIC<br>LOGIC", d: "Engineering narratives that stick. Defining the intersection of technical rigor and creative intuition." },
        { i: "ARCHIVE / 03", t: "GLOBAL<br>DISTRO", d: "Strategic signal optimization across fragmented networks. Calibrating resonance in the 2026 era." },
        { i: "ARCHIVE / 04", t: "THE<br>SCRAPBOOK", d: "Raw insights and tactical prototypes. The unfiltered engine room." },
        { i: "ARCHIVE / 05", t: "IDENTITY<br>PROFILE", d: "Lydia Yang. Content Strategist. Established 1998. Driven by the logic of the perfect blur." }
    ];

    function jumpTo(n) {
        event.stopPropagation();
        step = n;
        updateUI();
    }

    function stepMove(dir) {
        step = Math.max(0, Math.min(6, step + dir));
        updateUI();
    }

    function updateUI() {
        const cv = document.getElementById('cover');
        const pp = document.getElementById('paper');
        const bk = document.getElementById('back');
        const tabs = document.querySelectorAll('.nav-btn');

        tabs.forEach((t, i) => t.classList.toggle('active', i + 1 === step));

        if (step === 0) {
            cv.classList.remove('open');
            pp.classList.remove('active');
            bk.classList.remove('visible');
        } 
        else if (step === 6) {
            cv.classList.add('open');
            pp.classList.remove('active');
            bk.classList.add('visible');
        } 
        else {
            cv.classList.add('open');
            bk.classList.remove('visible');
            pp.classList.add('active');
            
            const p = data[step];
            document.getElementById('v-idx').innerText = p.i;
            document.getElementById('v-title').innerHTML = p.t;
            document.getElementById('v-desc').innerText = p.d;
        }
    }
</script>
</body>
</html>
