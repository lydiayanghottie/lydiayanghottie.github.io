<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYDIA_YANG // ARCHIVE_1998</title>
    <style>
        :root {
            --bg-color: #008080; /* 经典 Win98 桌面色 */
            --taskbar-bg: rgba(192, 192, 192, 0.8);
            --window-bg: rgba(255, 255, 255, 0.85);
            --accent: #000080; /* 标题栏深蓝色 */
            --crt-opacity: 0.15;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; cursor: crosshair; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Courier New', Courier, monospace;
            background-color: #000; overflow: hidden;
        }

        /* --- CRT 扫描线滤镜 (Vice City 风格) --- */
        body::after {
            content: " "; display: block; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 10000; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        /* --- BIOS 启动界面 --- */
        #bios-screen {
            position: fixed; inset: 0; background: #000; color: #00ff00;
            padding: 20px; z-index: 9999; font-size: 14px; line-height: 1.5;
        }
        .blink { animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- 桌面布局 --- */
        #desktop {
            position: relative; width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            display: none; /* 初始隐藏，等 BIOS 结束显示 */
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 80px);
            grid-template-rows: repeat(auto-fill, 100px);
            grid-gap: 20px;
            align-content: start;
        }

        /* 文件夹图标 */
        .folder {
            display: flex; flex-direction: column; align-items: center;
            color: white; text-align: center; text-shadow: 1px 1px #000;
            transition: 0.2s;
        }
        .folder:active { transform: scale(0.9); }
        .folder-icon { 
            font-size: 40px; margin-bottom: 5px; 
            filter: drop-shadow(2px 2px 0px #000);
        }
        .folder-name { font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 2px 4px; }

        /* --- 任务栏 (ryOS 风格) --- */
        #taskbar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 35px;
            background: var(--taskbar-bg); backdrop-filter: blur(10px);
            border-top: 2px solid #fff; display: flex; align-items: center;
            padding: 0 10px; z-index: 5000;
        }
        .start-btn {
            background: #c0c0c0; border: 2px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 2px 10px; font-weight: bold; font-size: 12px;
            display: flex; align-items: center; gap: 5px;
        }
        .clock { margin-left: auto; font-size: 12px; font-weight: bold; }

        /* --- 弹出窗口 (毛玻璃效果) --- */
        #window-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.3);
            display: none; align-items: center; justify-content: center; z-index: 6000;
        }
        .window {
            width: 90%; max-width: 500px; background: var(--window-bg);
            backdrop-filter: blur(15px); border: 2px solid #fff;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            animation: windowOpen 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        @keyframes windowOpen { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .title-bar {
            background: var(--accent); color: white; padding: 4px 8px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; font-weight: bold;
        }
        .close-btn { background: #c0c0c0; border: 1px solid #000; color: #000; padding: 0 5px; }
        .window-body { padding: 25px; color: #000; line-height: 1.6; }
        .window-body h2 { margin-top: 0; letter-spacing: -1px; }

    </style>
</head>
<body>

    <div id="bios-screen">
        <div id="log"></div>
        <div id="boot-status" style="margin-top:20px; color:#fff;" class="blink"></div>
    </div>

    <div id="desktop">
        <div class="folder" onclick="openFolder(1)">
            <div class="folder-icon">📁</div>
            <div class="folder-name">01_CREATION</div>
        </div>
        <div class="folder" onclick="openFolder(2)">
            <div class="folder-icon">📁</div>
            <div class="folder-name">02_STRATEGY</div>
        </div>
        <div class="folder" onclick="openFolder(3)">
            <div class="folder-icon">📁</div>
            <div class="folder-name">03_DISTRO</div>
        </div>
        <div class="folder" onclick="openFolder(4)">
            <div class="folder-icon">📁</div>
            <div class="folder-name">04_SCRAPBOOK</div>
        </div>
        <div class="folder" onclick="openFolder(5)">
            <div class="folder-icon">📁</div>
            <div class="folder-name">05_PROFILE</div>
        </div>
    </div>

    <div id="window-overlay">
        <div class="window">
            <div class="title-bar">
                <span id="wt-title">FOLDER_VIEWER</span>
                <button class="close-btn" onclick="closeFolder()">X</button>
            </div>
            <div class="window-body">
                <small id="wt-idx" style="opacity:0.5"></small>
                <h2 id="wt-header">TITLE</h2>
                <p id="wt-desc">Description goes here...</p>
            </div>
        </div>
    </div>

    <div id="taskbar">
        <div class="start-btn">🏁 Start</div>
        <div style="margin-left:15px; font-size:10px; opacity:0.6;">SYSTEM_1998_ACTIVE</div>
        <div class="clock" id="clock">00:00</div>
    </div>

    <script>
        // --- 1. BIOS 启动逻辑 ---
        const logs = [
            "HHBIOS(C)2000 Heffernan Henry Inc.",
            "Checking RAM: 14000 OK",
            "Initializing ryOS Kernel...",
            "Loading /sounds/AlertBonk.mp3...",
            "Loading /assets/index-V1998.js...",
            "Mounting /dev/archives/lydia_yang...",
            "SYSTEM_READY_FOR_BOOT"
        ];
        
        let logIdx = 0;
        const logEl = document.getElementById('log');
        
        function printLog() {
            if(logIdx < logs.length) {
                logEl.innerHTML += "> " + logs[logIdx] + "<br>";
                logIdx++;
                setTimeout(printLog, 200 + Math.random() * 300);
            } else {
                document.getElementById('boot-status').innerText = "CLICK TO INITIALIZE SYSTEM";
                window.onclick = bootSystem;
            }
        }
        printLog();

        function bootSystem() {
            document.getElementById('bios-screen').style.display = 'none';
            document.getElementById('desktop').style.display = 'grid';
            window.onclick = null;
        }

        // --- 2. 文件夹数据 ---
        const archiveData = {
            1: { idx: "ARCHIVE/01", h: "CONTENT CREATION", d: "Experimental archival aesthetics. Merging industrial precision with digital fluidity." },
            2: { idx: "ARCHIVE/02", h: "STRATEGIC LOGIC", d: "Engineering narratives that stick. Bridging technical rigor and human intuition." },
            3: { idx: "ARCHIVE/03", h: "GLOBAL DISTRO", d: "Calibrating signals in a hyper-connected era. Strategic signal optimization." },
            4: { idx: "ARCHIVE/04", h: "THE SCRAPBOOK", d: "Raw insights and tactical prototypes. The unfiltered engine room." },
            5: { idx: "ARCHIVE/05", h: "IDENTITY PROFILE", d: "Lydia Yang. Content Strategist. Based in the intersection of logic and creative vision." }
        };

        // --- 3. 交互逻辑 ---
        function openFolder(id) {
            const data = archiveData[id];
            document.getElementById('wt-idx').innerText = data.idx;
            document.getElementById('wt-header').innerText = data.h;
            document.getElementById('wt-desc').innerText = data.d;
            document.getElementById('window-overlay').style.display = 'flex';
        }

        function closeFolder() {
            document.getElementById('window-overlay').style.display = 'none';
        }

        // 时钟
        setInterval(() => {
            const n = new Date();
            document.getElementById('clock').innerText = n.getHours() + ":" + String(n.getMinutes()).padStart(2, '0');
        }, 1000);

    </script>
</body>
</html>
