<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYDIA YANG — ARCHIVE 2026</title>
    <style>
        :root {
            --bg: #000000;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --paper: #fcfcfc;
            /* 字体：优先使用苹果系统字体，无果则降级 */
            --font-main: "SF Pro Display", "-apple-system", "Helvetica Neue", sans-serif;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; cursor: none; }
        body { background-color: var(--bg); margin: 0; overflow: hidden; height: 100dvh; font-family: var(--font-main); color: var(--white); -webkit-font-smoothing: antialiased; }

        /* --- 1. 极致准心鼠标 --- */
        #cursor {
            width: 30px; height: 30px; position: fixed; pointer-events: none; z-index: 9999;
            mix-blend-mode: difference; transition: transform 0.1s ease-out;
            display: flex; align-items: center; justify-content: center;
        }
        #cursor::before { content: ""; position: absolute; width: 100%; height: 1px; background: white; opacity: 0.5; }
        #cursor::after { content: ""; position: absolute; width: 1px; height: 100%; background: white; opacity: 0.5; }

        /* --- 2. 交互逻辑层 --- */
        .click-area { position: fixed; top: 0; bottom: 0; z-index: 5000; }
        .area-left { left: 0; width: 35%; }
        .area-right { right: 0; width: 65%; }

        .container { position: relative; width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; perspective: 2000px; }

        /* --- 3. 封面：高透冷淡雾面 --- */
        .cover {
            position: absolute; inset: 0; z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(80px) saturate(100%);
            -webkit-backdrop-filter: blur(80px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 1.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid var(--border);
        }
        .cover.hide { transform: scale(1.05); opacity: 0; pointer-events: none; }

        .cover-title {
            font-size: clamp(60px, 14vw, 130px); font-weight: 800; letter-spacing: -0.06em;
            line-height: 0.8; margin: 0; text-align: center; color: #fff;
        }
        .cover-sub { margin-top: 40px; font-size: 10px; letter-spacing: 0.5em; opacity: 0.3; font-weight: 400; text-transform: uppercase; }

        /* --- 4. 侧边索引：极简文字 --- */
        .nav {
            position: absolute; right: 50px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 40px; z-index: 500;
        }
        .nav-item {
            font-size: 9px; letter-spacing: 0.2em; color: var(--white); opacity: 0.15;
            writing-mode: vertical-rl; text-transform: uppercase; transition: 0.4s;
            padding-right: 12px; border-right: 1px solid transparent;
        }
        .nav-item.active { opacity: 1; border-right: 1px solid white; }

        /* --- 5. 核心纸张 --- */
        .page {
            position: absolute; width: 88%; max-width: 960px; height: 78vh;
            background: var(--paper); border-radius: 4px;
            padding: 100px; color: #111; z-index: 100;
            box-shadow: 0 50px 120px rgba(0,0,0,0.6);
            transform: translateY(110vh); transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        .container.active .page { transform: translateY(0); }

        .page-meta { font-size: 10px; letter-spacing: 0.3em; opacity: 0.3; text-transform: uppercase; margin-bottom: 20px; }
        .page-title { font-size: clamp(36px, 6vw, 72px); font-weight: 700; letter-spacing: -0.04em; margin: 0; line-height: 0.95; }
        .page-desc { font-size: 19px; line-height: 1.5; max-width: 520px; color: #333; margin-top: 40px; font-weight: 400; }

        /* --- 6. 宝丽来 + 金属回形针 --- */
        .polaroid-box {
            position: absolute; bottom: 80px; right: 100px;
            width: 220px; background: #fff; padding: 14px 14px 45px 14px;
            box-shadow: 10px 20px 50px rgba(0,0,0,0.1);
            transform: rotate(3deg); transition: 0.6s var(--bezier);
            border: 1px solid #efefef;
        }
        .polaroid-box img { width: 100%; display: block; }
        
        /* 真实感回形针 (Paper Clip) */
        .clip {
            position: absolute; left: -10px; top: 40px; /* 夹在侧面 */
            width: 14px; height: 45px;
            border: 2px solid #bbb; border-radius: 10px;
            z-index: 10; background: transparent;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .clip::after {
            content: ""; position: absolute; top: 4px; left: 2px;
            width: 6px; height: 30px; border: 2px solid #ccc;
            border-top: none; border-radius: 0 0 5px 5px;
        }

        /* --- 7. 封底便利贴 --- */
        .footer-note {
            position: absolute; bottom: 80px; left: 100px;
            font-size: 26px; font-weight: 300; color: #999;
            opacity: 0; transition: 1s; padding-left: 20px;
            border-left: 1px solid #ddd;
        }
        .container.final .footer-note { opacity: 1; }

        @media (max-width: 768px) {
            .page { width: 94%; height: 82vh; padding: 40px; }
            .nav { right: 20px; }
            .nav-item { font-size: 8px; }
            .polaroid-box { width: 160px; right: 40px; bottom: 40px; }
            #cursor { display: none; }
        }
    </style>
</head>
<body>

<div id="cursor"></div>

<div class="click-area area-left" onclick="prevPage()"></div>
<div class="click-area area-right" onclick="nextPage()"></div>

<div class="container" id="container">
    
    <div class="cover" id="cover">
        <h1 class="cover-title">LYDIA<br>YANG</h1>
        <p class="cover-sub">Strategy • Creative • Archive</p>
    </div>

    <nav class="nav">
        <span class="nav-item" id="n1">Creation</span>
        <span class="nav-item" id="n2">Strategy</span>
        <span class="nav-item" id="n3">Distribution</span>
        <span class="nav-item" id="n4">Scrapbook</span>
        <span class="nav-item" id="n5">Profile</span>
    </nav>

    <div class="page" id="main-page">
        <div>
            <div class="page-meta" id="p-meta">Index / 01</div>
            <h2 class="page-title" id="p-title">Section Title</h2>
            <p class="page-desc" id="p-desc">Description of the content goes here with balanced whitespace.</p>
        </div>

        <div class="footer-note" id="footer-note">
            Nice to meet you.
        </div>

        <div class="polaroid-box" id="photo-box" style="display:none;">
            <div class="clip"></div>
            <img src="me.jpg" alt="Lydia Yang">
            <div style="margin-top:15px; font-size:10px; opacity:0.2; font-family:monospace;">DSC_2026_01.RAW</div>
        </div>
    </div>

</div>

<script>
    let step = 0; // 0:Cover, 1-5:Pages, 6:End
    const cursor = document.getElementById('cursor');

    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX - 15 + 'px';
        cursor.style.top = e.clientY - 15 + 'px';
    });

    const data = [
        {}, // placeholder
        { m: "Index / 01", t: "Content Creation", d: "Merging minimalist aesthetics with industrial precision. We build visual languages that transcend fleeting trends." },
        { m: "Index / 02", t: "Storytelling", d: "Strategic narratives designed to bridge the gap between human emotion and brand logic. Deep thinking, clear execution." },
        { m: "Index / 03", t: "Distribution", d: "Calibrating brand signals to reach the right frequency. Navigation through the fragmented digital landscape." },
        { m: "Index / 04", t: "The Scrapbook", d: "A raw feed of inspiration, half-baked prototypes, and the evolution of a digital archive." },
        { m: "Index / 05", t: "Profile", d: "Lydia Yang. A strategist fueled by logic and inspired by the 'perfect blur'. Currently based in the digital realm." }
    ];

    function nextPage() { if (step < 6) { step++; render(); } }
    function prevPage() { if (step > 0) { step--; render(); } }

    function render() {
        const stage = document.getElementById('container');
        const cover = document.getElementById('cover');
        const photo = document.getElementById('photo-box');
        const footer = document.getElementById('footer-note');

        // 封面切换
        step === 0 ? cover.classList.remove('hide') : cover.classList.add('hide');
        
        // 内容渲染
        if (step >= 1 && step <= 5) {
            stage.classList.add('active');
            stage.classList.remove('final');
            document.getElementById('p-meta').innerText = data[step].m;
            document.getElementById('p-title').innerText = data[step].t;
            document.getElementById('p-desc').innerText = data[step].d;
            
            photo.style.display = (step === 5) ? "block" : "none";
            footer.style.display = "none";

            document.querySelectorAll('.nav-item').forEach((n, i) => {
                n.classList.toggle('active', i + 1 === step);
            });
        } else if (step === 6) {
            stage.classList.remove('active');
            stage.classList.add('final');
            footer.style.display = "block";
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        } else {
            stage.classList.remove('active');
        }
    }
</script>
</body>
</html>
