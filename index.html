<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYDIA_YANG // HHBIOS V1998 [LOADING...]</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 2. 复古配色方案 */
            --bg-color: #008080;   /* Windows 95/98 经典蓝绿色桌面 */
            --window-bg: #c0c0c0;   /* 灰色窗口背景 */
            --window-title: #000080; /* 深蓝色窗口标题栏 */
            --window-title-text: #ffffff; /* 窗口标题文字 */
            --window-border: #000000;  /* 窗口边框 */
            --window-bevel-light: #ffffff; /* 模拟 3D 浮雕的亮边 */
            --window-bevel-dark: #808080; /* 模拟 3D 浮雕的暗边 */
            --bios-text: #00ff00;    /* BIOS 绿色文字 */
            --bios-bg: #000000;      /* BIOS 黑色背景 */
            --content-text: #000000;  /* 内容文字 */
            
            --curve: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; cursor: default; }
        body { margin: 0; overflow: hidden; height: 100dvh; font-family: 'Inter', sans-serif; background-color: var(--bios-bg); color: var(--bios-text); }

        /* --- BIOS 开机序列区域 --- */
        #bios-screen {
            position: fixed; inset: 0; background: var(--bios-bg); z-index: 9999;
            padding: 40px; font-family: 'Courier New', monospace; /* 强制 BIOS 风格字体 */
            font-size: 14px; line-height: 1.6; letter-spacing: 1px;
            display: flex; flex-direction: column; justify-content: flex-start;
            pointer-events: none; /* BIOS 期间不可点击 */
            opacity: 1; transition: opacity 0.8s var(--curve);
        }
        #bios-text { white-space: pre; } /* 保留换行和空格 */

        /* --- 3D 桌面区域 --- */
        #desktop-screen {
            position: fixed; inset: 0; background-color: var(--bg-color); z-index: 1000;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 40px;
            opacity: 0; transition: opacity 0.8s var(--curve);
            display: none; /* 初始隐藏 */
        }
        
        /* 为了手机端更好看，我们把文件夹排列方式改一下 */
        @media (min-width: 768px) {
            #desktop-screen { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
        }

        /* --- 桌面文件夹图标 --- */
        .desktop-icon {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 80px; height: 100px; padding: 10px; cursor: pointer;
            transition: all 0.3s; text-align: center;
        }
        .desktop-icon:hover { background-color: rgba(255,255,255,0.1); }
        .desktop-icon:active { transform: scale(0.95); }

        /* 3. 复古文件夹图标（我们先用 emoji 📁，你以后可以上传图片替换） */
        .folder-image { font-size: 48px; margin-bottom: 5px; user-select: none; }
        .folder-label {
            font-size: 10px; color: #fff; background-color: #000; padding: 2px 4px;
            word-wrap: break-word; line-height: 1.2;
        }

        /* --- 复古窗口 (Window Modal) --- */
        #window-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 90%; max-width: 700px; height: 80vh; max-height: 600px;
            background-color: var(--window-bg); color: var(--content-text);
            z-index: 2000; display: none; /* 初始隐藏 */
            opacity: 0; transition: transform 0.4s var(--curve), opacity 0.4s;
            
            /* 4. 模拟 3D 浮雕边框效果 */
            border: 2px solid var(--window-border);
            box-shadow: inset 1px 1px 0 var(--window-bevel-light),
                        inset -1px -1px 0 rgba(0,0,0,0.5),
                        2px 2px 0 var(--window-border);
        }
        #window-modal.open { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* 窗口标题栏 */
        .window-titlebar {
            background-color: var(--window-title); color: var(--window-title-text);
            padding: 3px 6px; font-weight: 900; font-size: 14px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: move; /* 假装可以拖动 */
            user-select: none;
        }

        /* 窗口关闭按钮 */
        .window-close-btn {
            width: 16px; height: 16px; background: var(--window-bg);
            border: 1px solid var(--window-border);
            color: #000; font-size: 11px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: inset 1px 1px 0 var(--window-bevel-light),
                        inset -1px -1px 0 rgba(0,0,0,0.5);
        }
        .window-close-btn:active { box-shadow: inset -1px -1px 0 var(--window-bevel-light), inset 1px 1px 0 #000; }

        /* 窗口内容区域 */
        #window-content {
            padding: 40px; height: calc(100% - 22px); /* 减去标题栏高度 */
            overflow-y: auto; /* 自动滚动 */
            -webkit-overflow-scrolling: touch; /* 手机滑动优化 */
        }
        
        #window-idx { font-size: 10px; font-weight: 900; opacity: 0.2; letter-spacing: 3px; }
        #window-title { font-size: clamp(30px, 6vw, 60px); font-weight: 900; letter-spacing: -3px; line-height: 0.85; margin: 15px 0; }
        #window-desc { font-size: 16px; line-height: 1.4; color: #333; max-width: 450px; }

        /* 5. 电脑端鼠标十字光标（简单实现复古感） */
        @media (pointer: fine) {
            * { cursor: crosshair; }
            .window-close-btn, .desktop-icon { cursor: pointer; }
        }

    </style>
</head>
<body>

    <div id="bios-screen">
        <div id="bios-text"></div>
        <div style="position:fixed; bottom:20px; left:40px; font-weight:900; animation:blink 1s infinite;" id="bios-status">[ HHBIOS_V1998 // INITIALIZING... ]</div>
    </div>

    <div id="desktop-screen">
        <div class="desktop-icon" onclick="openWindow(1)" id="folder1">
            <div class="folder-image">📁</div>
            <div class="folder-label">01_CREATION</div>
        </div>
        <div class="desktop-icon" onclick="openWindow(2)" id="folder2">
            <div class="folder-image">📁</div>
            <div class="folder-label">02_STRATEGY</div>
        </div>
        <div class="desktop-icon" onclick="openWindow(3)" id="folder3">
            <div class="folder-image">📁</div>
            <div class="folder-label">03_DISTRO</div>
        </div>
        <div class="desktop-icon" onclick="openWindow(4)" id="folder4">
            <div class="folder-image">📁</div>
            <div class="folder-label">04_SCRAPBOOK</div>
        </div>
        <div class="desktop-icon" onclick="openWindow(5)" id="folder5">
            <div class="folder-image">📁</div>
            <div class="folder-label">05_PROFILE</div>
        </div>
    </div>

    <div id="window-modal">
        <div class="window-titlebar">
            <span id="window-titlebar-text">C:\LYDIA_YANG // ARCHIVE...</span>
            <div class="window-close-btn" onclick="closeWindow()">X</div>
        </div>
        <div id="window-content">
            <div id="window-idx">INDEX / 01</div>
            <h2 id="window-title">CONTENT<br>CREATION</h2>
            <p id="window-desc">Content loading...</p>
        </div>
    </div>

    <style> @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } } </style>

    <script>
        // --- BIOS 开机序列文本 ---
        const biosLines = [
            "HHBIOS V1998 (C) 1998 Heffernan Henry Inc.",
            "Special UC131S Showcase System V1.0",
            "Establishing Connection...",
            "Checking RAM: 14000 OK",
            "Searching for Boot Sector...",
            "Loaded keyboardKeydown6 ... 63%",
            "Loaded office ... 100%",
            "",
            "SYSTEM_INIT [ARCHIVE_1998] ... [READY]",
            "Tap screen to launch..."
        ];

        // --- 8. 内容数据 (和你原本的数据完全一致) ---
        const data = [
            {}, // 0
            { i: "INDEX / 01", t: "CONTENT<br>CREATION", d: "Experimental archival aesthetics. Merging industrial precision with digital fluidity for the next generation of creative systems." },
            { i: "INDEX / 02", t: "STRATEGIC<br>LOGIC", d: "Engineering narratives that stick. We bridge the gap between technical rigor and human intuition." },
            { i: "INDEX / 03", t: "GLOBAL<br>DISTRO", d: "Calibrating signals in a hyper-connected era. Strategic signal optimization across fragmented digital landscapes." },
            { i: "INDEX / 04", t: "THE<br>SCRAPBOOK", d: "Raw insights and tactical prototypes. The unfiltered engine room of digital development." },
            { i: "INDEX / 05", t: "IDENTITY<br>PROFILE", d: "Lydia Yang. Content Strategist. Based in the intersection of logic and creative vision. Established 1998." }
        ];

        let lineIdx = 0;
        let isStarted = false;
        const biosTextEl = document.getElementById('bios-text');

        // 初始化：逐步加载 BIOS 文本
        window.addEventListener('load', () => {
            document.title = "LYDIA_YANG // HHBIOS V1998 [INITIALIZING]";
            setTimeout(addBiosLine, 1000); // 1秒后开始加载
        });

        // 9. BIOS 加载逻辑 (打字机效果)
        function addBiosLine() {
            if (lineIdx < biosLines.length) {
                // 如果是第一行，我们要强制加个“开机”延迟
                let delay = 150 + Math.random() * 200; // 模拟加载速度
                if (lineIdx === 0) delay = 1000;
                
                biosTextEl.innerHTML += biosLines[lineIdx] + '<br>';
                lineIdx++;
                setTimeout(addBiosLine, delay);
                
                // 滚到底部
                window.scrollTo(0, document.body.scrollHeight);
            } else {
                // 加载完毕，等待用户点击启动
                document.getElementById('bios-status').innerHTML = "[ PRESS START // CLICK TO INITIALIZE ]";
                biosTextEl.innerHTML += '<br><strong style="animation:blink 1s infinite;">></strong>'; // 闪烁的光标
                window.addEventListener('click', startSystem);
                window.addEventListener('touchstart', startSystem); // 兼容手机
            }
        }

        // 10. BIOS 到桌面的转换
        function startSystem() {
            if (isStarted) return;
            isStarted = true;
            document.title = "LYDIA_YANG // ARCHIVE_1998";
            
            // 绿色开机闪烁效果 (高级小白可以试着加个开机音效)
            biosTextEl.style.color = "#fff";
            document.body.style.backgroundColor = "#fff";
            
            setTimeout(() => {
                document.getElementById('bios-screen').style.opacity = "0";
                document.getElementById('bios-screen').style.pointerEvents = "none";
                
                // 桌面出现
                document.getElementById('desktop-screen').style.display = "grid";
                document.getElementById('desktop-screen').style.opacity = "1";
                
                // 这里我们给用户一个提示：桌面已经好了
                console.log("Welcome to SYSTEM_1998 V1.0");
            }, 300);
        }

        // --- 11. 窗口管理逻辑 ---
        function openWindow(idx) {
            const p = data[idx];
            if (!p) return;

            // 更新窗口内的内容
            document.getElementById('window-titlebar-text').innerText = "📁 " + p.t.replace('<br>', ' '); // 替换换行为空格
            document.getElementById('window-idx').innerText = p.i;
            document.getElementById('window-title').innerHTML = p.t;
            document.getElementById('window-desc').innerText = p.d;

            // 显示窗口
            const windowEl = document.getElementById('window-modal');
            windowEl.style.display = "block"; // 先让它存在，这样才能做过渡
            setTimeout(() => {
                windowEl.classList.add('open');
            }, 50); // 小延迟让过渡效果更好
            
            // 这里我们记录一下当前是哪一页
            console.log("Accessing Archive Section: " + idx);
        }

        function closeWindow() {
            const windowEl = document.getElementById('window-modal');
            windowEl.classList.remove('open');
            
            // 过渡动画结束后彻底隐藏，防止挡住桌面
            setTimeout(() => {
                windowEl.style.display = "none";
            }, 400); 
        }

    </style>

</body>
</html>
