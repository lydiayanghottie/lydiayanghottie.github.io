<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lydia Yang — Content Strategist</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–paper: #f0ebe2;
–paper-dark: #e4ddd1;
–paper-shadow: #c8bfb0;
–ink: #1a1714;
–ink-light: #6b6560;
–ink-faint: #a09890;
–tab-1: rgba(255, 200, 150, 0.75);   /* warm amber */
–tab-2: rgba(180, 210, 190, 0.75);   /* sage */
–tab-3: rgba(200, 185, 230, 0.75);   /* lavender */
–tab-4: rgba(240, 195, 195, 0.75);   /* blush */
–tab-5: rgba(170, 215, 230, 0.75);   /* sky */
–clip: #b8b0a5;
}

html, body {
width: 100%; height: 100%;
overflow: hidden;
background: #d4cec6;
font-family: ‘EB Garamond’, Georgia, serif;
display: flex;
align-items: center;
justify-content: center;
}

/* Desk texture */
body::before {
content: ‘’;
position: fixed; inset: 0;
background:
repeating-linear-gradient(
92deg,
transparent 0px, transparent 3px,
rgba(0,0,0,0.015) 3px, rgba(0,0,0,0.015) 4px
),
repeating-linear-gradient(
2deg,
transparent 0px, transparent 5px,
rgba(0,0,0,0.01) 5px, rgba(0,0,0,0.01) 6px
);
pointer-events: none;
z-index: 0;
}

.scene {
position: relative;
width: min(900px, 96vw);
height: min(640px, 90vh);
z-index: 1;
perspective: 2000px;
}

/* ── BOOK SPREAD ── */
.book {
position: relative;
width: 100%; height: 100%;
display: flex;
align-items: stretch;
filter: drop-shadow(0 30px 60px rgba(0,0,0,0.25)) drop-shadow(0 8px 20px rgba(0,0,0,0.15));
}

/* Left page (back of previous) */
.page-left {
position: relative;
flex: 1;
background: var(–paper-dark);
border-radius: 4px 0 0 4px;
overflow: visible;
transition: background 0.4s;
}

/* Right page (front of current) */
.page-right {
position: relative;
flex: 1;
background: var(–paper);
border-radius: 0 4px 4px 0;
overflow: visible;
transition: background 0.4s;
}

/* Spine shadow */
.spine {
width: 12px;
background: linear-gradient(to right, #b8b2aa, #ccc5bb, #b8b2aa);
flex-shrink: 0;
box-shadow: inset -2px 0 4px rgba(0,0,0,0.1), inset 2px 0 4px rgba(0,0,0,0.1);
position: relative;
z-index: 10;
}

/* Paperclip on cover */
.paperclip {
position: absolute;
top: 28px; left: 28px;
width: 28px; height: 60px;
z-index: 20;
}

.paperclip svg { width: 100%; height: 100%; }

/* Binder clip */
.binderclip {
position: absolute;
top: 0; right: 60px;
transform: translateY(-8px);
width: 36px; height: 50px;
z-index: 20;
}

/* ── TABS (colored sticky flags) ── */
.tab {
position: absolute;
right: -38px;
width: 46px;
height: 52px;
border-radius: 0 6px 6px 0;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: right 0.2s ease, filter 0.2s;
z-index: 30;
backdrop-filter: blur(2px);
-webkit-backdrop-filter: blur(2px);
box-shadow: 2px 2px 6px rgba(0,0,0,0.12);
}

.tab:hover { right: -44px; filter: brightness(1.05); }
.tab.active { right: -50px; filter: brightness(1.1); box-shadow: 3px 3px 10px rgba(0,0,0,0.18); }

.tab span {
font-family: ‘DM Mono’, monospace;
font-size: 7.5px;
font-weight: 500;
letter-spacing: 0.08em;
text-transform: uppercase;
color: rgba(30,25,20,0.7);
writing-mode: vertical-rl;
text-orientation: mixed;
transform: rotate(180deg);
line-height: 1;
}

.tab-1 { background: var(–tab-1); top: 40px; }
.tab-2 { background: var(–tab-2); top: 102px; }
.tab-3 { background: var(–tab-3); top: 164px; }
.tab-4 { background: var(–tab-4); top: 226px; }
.tab-5 { background: var(–tab-5); top: 288px; }

/* ── NAV ARROWS ── */
.nav-arrow {
position: absolute;
top: 50%; transform: translateY(-50%);
width: 44px; height: 44px;
background: rgba(255,255,255,0.6);
border: 1px solid rgba(0,0,0,0.12);
border-radius: 50%;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: background 0.2s, transform 0.2s;
z-index: 50;
backdrop-filter: blur(4px);
font-size: 18px;
color: var(–ink);
user-select: none;
box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.nav-arrow:hover { background: rgba(255,255,255,0.9); transform: translateY(-50%) scale(1.05); }
.nav-arrow:active { transform: translateY(-50%) scale(0.97); }
.nav-arrow.left { left: -60px; }
.nav-arrow.right { right: -60px; }
.nav-arrow.disabled { opacity: 0.25; cursor: default; pointer-events: none; }

/* ── PAGE CONTENT ── */
.page-content {
position: absolute;
inset: 0;
padding: 44px 40px;
overflow: hidden;
}

.page-content.left-content {
padding: 44px 36px 44px 44px;
}

/* Page number */
.page-num {
position: absolute;
bottom: 22px;
font-family: ‘DM Mono’, monospace;
font-size: 9px;
color: var(–ink-faint);
letter-spacing: 0.1em;
}

.page-num.left { left: 44px; }
.page-num.right { right: 44px; }

/* Horizontal rule */
.rule {
width: 100%;
height: 0.5px;
background: var(–ink-light);
opacity: 0.3;
margin: 16px 0;
}

.rule-bold {
width: 100%;
height: 1px;
background: var(–ink);
opacity: 0.8;
margin: 12px 0;
}

/* ── COVER PAGE ── */
.cover-label {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: 0.18em;
color: var(–ink-light);
text-transform: uppercase;
margin-bottom: 6px;
}

.cover-id {
font-family: ‘DM Mono’, monospace;
font-size: 8px;
color: var(–ink-faint);
letter-spacing: 0.1em;
}

.cover-photo-box {
width: 72px; height: 72px;
border: 1px solid var(–ink-light);
background: var(–paper-dark);
display: flex; align-items: center; justify-content: center;
margin-bottom: 10px;
position: relative;
overflow: hidden;
}

.cover-photo-placeholder {
font-family: ‘DM Mono’, monospace;
font-size: 7px;
color: var(–ink-faint);
text-align: center;
line-height: 1.5;
padding: 4px;
}

.id-card {
position: absolute;
top: 32px; left: 32px;
background: white;
border: 0.5px solid #ccc;
padding: 10px 14px 10px 10px;
display: flex;
gap: 10px;
align-items: flex-start;
box-shadow: 1px 2px 6px rgba(0,0,0,0.12);
z-index: 15;
min-width: 180px;
}

.id-card-text {}

.id-name {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
font-weight: 500;
letter-spacing: 0.05em;
color: var(–ink);
line-height: 1.3;
}

.id-meta {
font-family: ‘DM Mono’, monospace;
font-size: 7.5px;
color: var(–ink-light);
letter-spacing: 0.05em;
line-height: 1.6;
margin-top: 4px;
}

.cover-title-area {
position: absolute;
bottom: 80px; left: 40px; right: 40px;
}

.cover-big-title {
font-family: ‘Cormorant Garamond’, serif;
font-size: 13px;
font-weight: 300;
letter-spacing: 0.35em;
color: var(–ink);
text-transform: uppercase;
margin-bottom: 6px;
}

.cover-name {
font-family: ‘EB Garamond’, serif;
font-size: 42px;
font-weight: 500;
color: var(–ink);
letter-spacing: -0.01em;
line-height: 1;
margin-bottom: 12px;
}

.cover-sub {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
color: var(–ink-light);
letter-spacing: 0.2em;
text-transform: uppercase;
}

.cover-bottom-label {
position: absolute;
bottom: 32px; left: 40px;
font-family: ‘DM Mono’, monospace;
font-size: 8px;
color: var(–ink-faint);
letter-spacing: 0.15em;
text-transform: uppercase;
}

/* ── ALPHABET BG (like Worling cover) ── */
.alpha-bg {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
justify-content: space-around;
padding: 20px 24px;
opacity: 0.07;
pointer-events: none;
overflow: hidden;
}

.alpha-row {
font-family: ‘EB Garamond’, serif;
font-size: 36px;
letter-spacing: 0.15em;
color: var(–ink);
white-space: nowrap;
}

/* ── INNER PAGES ── */
.inner-label {
font-family: ‘DM Mono’, monospace;
font-size: 8px;
letter-spacing: 0.2em;
color: var(–ink-faint);
text-transform: uppercase;
margin-bottom: 20px;
}

.inner-heading {
font-family: ‘Cormorant Garamond’, serif;
font-size: 32px;
font-weight: 300;
color: var(–ink);
letter-spacing: 0.02em;
line-height: 1.15;
margin-bottom: 6px;
}

.inner-heading em {
font-style: italic;
font-weight: 300;
}

.inner-body {
font-family: ‘EB Garamond’, serif;
font-size: 13.5px;
color: var(–ink-light);
line-height: 1.75;
letter-spacing: 0.01em;
}

.inner-body strong {
color: var(–ink);
font-weight: 600;
}

.case-item {
margin-bottom: 20px;
padding-bottom: 20px;
border-bottom: 0.5px solid rgba(0,0,0,0.1);
}

.case-item:last-child { border-bottom: none; margin-bottom: 0; }

.case-tag {
font-family: ‘DM Mono’, monospace;
font-size: 8px;
letter-spacing: 0.15em;
color: var(–ink-faint);
text-transform: uppercase;
margin-bottom: 5px;
}

.case-title {
font-family: ‘EB Garamond’, serif;
font-size: 17px;
font-weight: 600;
color: var(–ink);
letter-spacing: 0.01em;
margin-bottom: 4px;
}

.case-desc {
font-family: ‘EB Garamond’, serif;
font-size: 12.5px;
color: var(–ink-light);
line-height: 1.6;
}

.stat-row {
display: flex;
gap: 0;
margin-top: 20px;
}

.stat-col {
flex: 1;
padding: 12px 14px;
border-left: 0.5px solid rgba(0,0,0,0.15);
}

.stat-col:first-child { border-left: none; padding-left: 0; }

.stat-num {
font-family: ‘Cormorant Garamond’, serif;
font-size: 28px;
font-weight: 400;
color: var(–ink);
line-height: 1;
margin-bottom: 4px;
}

.stat-label {
font-family: ‘DM Mono’, monospace;
font-size: 7px;
letter-spacing: 0.12em;
color: var(–ink-faint);
text-transform: uppercase;
line-height: 1.4;
}

/* Left side mirror content */
.mirror-label {
font-family: ‘DM Mono’, monospace;
font-size: 8px;
letter-spacing: 0.2em;
color: var(–ink-faint);
text-transform: uppercase;
margin-bottom: 28px;
}

.mirror-quote {
font-family: ‘Cormorant Garamond’, serif;
font-size: 20px;
font-weight: 300;
font-style: italic;
color: var(–ink-light);
line-height: 1.5;
letter-spacing: 0.01em;
}

.watermark {
position: absolute;
bottom: 44px; right: 40px;
font-family: ‘Cormorant Garamond’, serif;
font-size: 80px;
font-weight: 300;
color: rgba(0,0,0,0.04);
line-height: 1;
pointer-events: none;
letter-spacing: -0.03em;
}

/* Back cover */
.back-content {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 20px;
}

.back-monogram {
font-family: ‘Cormorant Garamond’, serif;
font-size: 72px;
font-weight: 300;
color: rgba(0,0,0,0.08);
letter-spacing: -0.05em;
line-height: 1;
}

.back-contact {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: 0.2em;
color: var(–ink-light);
text-align: center;
line-height: 2.2;
text-transform: uppercase;
}

.back-rule {
width: 40px; height: 0.5px;
background: var(–ink-light);
opacity: 0.5;
}

/* ── FLIP ANIMATION ── */
@keyframes flipRight {
0%   { opacity: 1; transform: none; }
40%  { opacity: 0.3; }
100% { opacity: 1; transform: none; }
}

@keyframes flipLeft {
0%   { opacity: 1; }
40%  { opacity: 0.3; }
100% { opacity: 1; }
}

.flipping-right { animation: flipRight 0.35s ease; }
.flipping-left  { animation: flipLeft 0.35s ease; }

/* Progress dots */
.progress {
position: absolute;
bottom: -32px;
left: 50%; transform: translateX(-50%);
display: flex; gap: 7px;
z-index: 40;
}

.dot {
width: 5px; height: 5px;
border-radius: 50%;
background: rgba(0,0,0,0.2);
transition: background 0.3s, transform 0.3s;
}

.dot.active {
background: rgba(0,0,0,0.55);
transform: scale(1.3);
}

/* ── FROSTED COVER ── */
.frosted-cover {
position: absolute;
inset: 0;
/* Frosted polypropylene look */
background: linear-gradient(
135deg,
rgba(255,255,255,0.62) 0%,
rgba(245,242,238,0.55) 40%,
rgba(255,255,255,0.50) 70%,
rgba(240,237,232,0.58) 100%
);
backdrop-filter: blur(0px);
-webkit-backdrop-filter: blur(0px);
border-radius: 0 4px 4px 0;
overflow: hidden;
}

/* Frosted surface micro-texture */
.frosted-cover::before {
content: ‘’;
position: absolute; inset: 0;
background-image:
url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 200 200’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.06’/%3E%3C/svg%3E”);
background-size: 160px 160px;
opacity: 0.5;
pointer-events: none;
}

/* Sheen stripe — like light on polypropylene */
.frosted-cover::after {
content: ‘’;
position: absolute;
top: -10%; left: -20%;
width: 55%; height: 130%;
background: linear-gradient(
105deg,
rgba(255,255,255,0) 0%,
rgba(255,255,255,0.22) 45%,
rgba(255,255,255,0.08) 55%,
rgba(255,255,255,0) 100%
);
transform: skewX(-8deg);
pointer-events: none;
}

/* Content inside frosted cover */
.frosted-inner {
position: relative;
z-index: 2;
height: 100%;
display: flex;
flex-direction: column;
padding: 36px 36px 28px;
}

/* ── PAPERCLIP SVG ── */
.clip-wrap {
position: absolute;
top: -6px;
left: 36px;
z-index: 30;
width: 26px;
height: 72px;
}

/* ── ID CARD ── */
.id-card-new {
background: #ffffff;
border: 0.5px solid rgba(0,0,0,0.13);
box-shadow:
0 2px 8px rgba(0,0,0,0.10),
0 1px 2px rgba(0,0,0,0.06);
display: flex;
gap: 0;
width: 100%;
max-width: 260px;
margin-top: 52px;   /* space for clip */
position: relative;
flex-shrink: 0;
}

.id-photo {
width: 72px;
height: 88px;
flex-shrink: 0;
overflow: hidden;
background: #e8e4de;
position: relative;
}

.id-photo img {
width: 100%;
height: 100%;
object-fit: cover;
object-position: center top;
display: block;
/* B&W treatment like reference */
filter: grayscale(100%) contrast(1.05);
}

.id-info {
padding: 10px 12px;
display: flex;
flex-direction: column;
justify-content: space-between;
flex: 1;
}

.id-info-name {
font-family: ‘DM Mono’, monospace;
font-size: 11.5px;
font-weight: 500;
letter-spacing: 0.04em;
color: #1a1714;
line-height: 1.25;
text-transform: uppercase;
}

.id-info-meta {
font-family: ‘DM Mono’, monospace;
font-size: 7.5px;
color: #888;
letter-spacing: 0.04em;
line-height: 1.8;
margin-top: 6px;
}

.id-info-num {
font-family: ‘DM Mono’, monospace;
font-size: 7px;
color: #bbb;
letter-spacing: 0.08em;
margin-top: 8px;
display: flex;
justify-content: space-between;
}

/* ── COVER BODY TEXT ── */
.cover-body {
flex: 1;
display: flex;
flex-direction: column;
justify-content: flex-end;
padding-bottom: 4px;
}

.cover-eyebrow {
font-family: ‘DM Mono’, monospace;
font-size: 8px;
letter-spacing: 0.22em;
color: rgba(30,25,20,0.45);
text-transform: uppercase;
margin-bottom: 10px;
}

.cover-main-name {
font-family: ‘EB Garamond’, serif;
font-size: clamp(38px, 7vw, 56px);
font-weight: 500;
color: rgba(20,16,12,0.82);
letter-spacing: -0.01em;
line-height: 0.95;
margin-bottom: 14px;
}

.cover-title-tag {
font-family: ‘DM Mono’, monospace;
font-size: 8.5px;
letter-spacing: 0.2em;
color: rgba(30,25,20,0.5);
text-transform: uppercase;
margin-bottom: 20px;
}

.cover-divider {
width: 32px; height: 0.5px;
background: rgba(0,0,0,0.3);
margin-bottom: 16px;
}

.cover-footer-label {
font-family: ‘DM Mono’, monospace;
font-size: 7.5px;
letter-spacing: 0.16em;
color: rgba(30,25,20,0.35);
text-transform: uppercase;
}

/* ── ALPHA BG (showing through frosted cover) ── */
.alpha-behind {
position: absolute;
inset: 0;
z-index: 1;
display: flex;
flex-direction: column;
justify-content: space-around;
padding: 16px 20px;
pointer-events: none;
overflow: hidden;
}

.alpha-behind .alpha-row {
font-family: ‘EB Garamond’, serif;
font-size: clamp(28px, 4vw, 40px);
letter-spacing: 0.12em;
color: rgba(30,25,20,0.13);
white-space: nowrap;
}

/* ── MOBILE: single page view ── */
@media (max-width: 680px) {
.scene {
width: 100vw;
height: 100dvh;
perspective: none;
}

.book {
width: 100%;

}

/* On mobile: hide left page, show only right */
.page-left {

}

.tab span { font-size: 6.5px; }

.tab-1 { top: 30px; }

/* Inner pages mobile */

@media (min-width: 681px) and (max-width: 900px) {

.cover-main-name { font-size: 44px; }
.id-card-new { max-width: 220px; }
}
</style>

</head>

// ─── STATE ───────────────────────────────────────────────────────────────────

let current = 0;
const total = PAGES.length;

// ─── RENDER ──────────────────────────────────────────────────────────────────

function render(dir) {
  const p = PAGES[current];

  const leftContent = document.getElementById('leftContent');
  const rightContent = document.getElementById('rightContent');
  const leftNum = document.getElementById('leftNum');
  const rightNum = document.getElementById('rightNum');
  const book = document.getElementById('book');

  // Animate
  book.classList.remove('flipping-right', 'flipping-left');
  void book.offsetWidth; // reflow
  if (dir === 'right') book.classList.add('flipping-right');
  if (dir === 'left')  book.classList.add('flipping-left');

  leftContent.innerHTML = p.leftHTML;
  rightContent.innerHTML = p.rightHTML;
  leftNum.textContent = p.leftNum;
  rightNum.textContent = p.rightNum;

  // Tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.page) === p.tabActive);
  });

  // Nav buttons
  document.getElementById('btnLeft').classList.toggle('disabled', current === 0);
  document.getElementById('btnRight').classList.toggle('disabled', current === total - 1);

  // Progress
  updateProgress();
}

function updateProgress() {
  const prog = document.getElementById('progress');
  prog.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    prog.appendChild(d);
  }
}

function nextPage() {
  if (current < total - 1) { current++; render('right'); }
}

function prevPage() {
  if (current > 0) { current--; render('left'); }
}

function goToPage(tabIndex) {
  const idx = PAGES.findIndex(p => p.tabActive === tabIndex);
  if (idx === -1 || idx === current) return;
  const dir = idx > current ? 'right' : 'left';
  current = idx;
  render(dir);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevPage();
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) { dx < 0 ? nextPage() : prevPage(); }
}, { passive: true });

// Init
render(null);
</script>
