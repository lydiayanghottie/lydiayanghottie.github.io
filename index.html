<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYDIA YANG // ARCHIVE_V8.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #c5c5c1; 
            --paper: #ffffff;
            --glass: rgba(255, 255, 255, 0.38);
            --apple-curve: cubic-bezier(0.2, 0, 0, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; cursor: none; }
        body { background-color: var(--bg); margin: 0; overflow: hidden; height: 100dvh; font-family: 'Inter', sans-serif; }

        /* 左右大区域点击翻页 */
        .nav-zone { position: fixed; top: 0; bottom: 0; z-index: 500; width: 35%; }
        .next-z { right: 0; } .prev-z { left: 0; }

        .stage { position: relative; width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; perspective: 3000px; }

        /* --- 3. 3D 容器 --- */
        .book-container {
            position: relative; width: 90%; max-width: 900px; height: 85vh;
            transform-style: preserve-3d; transition: transform 1.2s var(--apple-curve);
        }

        /* --- 封底 & 封面 通用质感 (V8 原生噪点) --- */
        .acrylic-plate {
            position: absolute; inset: 0;
            background: var(--glass);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
            backdrop-filter: blur(35px) saturate(120%); -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 4px;
            transform-origin: left center; transition: 1.4s var(--apple-curve);
        }

        /* 封底内容 (MADE IN DALI 融合条形码) */
        .back-cover { z-index: 5; display: flex; align-items: center; justify-content: center; }
        .graphic-barcode {
            display: flex; flex-direction: column; align-items: center;
            mix-blend-mode: multiply; filter: contrast(1.5);
        }
        .barcode-lines {
            width: 280px; height: 80px;
            background: repeating-linear-gradient(90deg, #000, #000 2px, transparent 2px, transparent 6px),
                        repeating-linear-gradient(90deg, #000, #000 1px, transparent 1px, transparent 12px);
            mask-image: linear-gradient(to right, black 70%, transparent);
        }
        .barcode-merged-text {
            margin-top: -15px; font-weight: 900; font-size: 24px; letter-spacing: 12px;
            color: #000; font-family: monospace; text-transform: uppercase;
            /* 关键：让文字看起来像条形码的一部分 */
            clip-path: inset(0 0 0 0); opacity: 0.9;
        }

        /* 封面内容 */
        .front-cover { z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .front-cover.open { transform: rotateY(-110deg) scale(1.05); opacity: 0; pointer-events: none; }

        /* 右上角锋利环型针 */
        .photo-pin {
            position: absolute; right: 45px; top: 45px; width: 170px;
            background: #fff; padding: 10px 10px 35px 10px;
            box-shadow: 15px 20px 40px rgba(0,0,0,0.15); transform: rotate(2deg);
        }
        .photo-pin img { width: 100%; display: block; }
        .steel-clip {
            position: absolute; right: 25px; top: -12px;
            width: 15px; height: 48px; border: 2.5px solid #888; border-radius: 10px;
            z-index: 1100; box-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        .steel-clip::after {
            content: ""; position: absolute; top: 6px; left: 2.5px;
            width: 6px; height: 32px; border: 2.2px solid #aaa; border-top: none; border-radius: 0 0 5px 5px;
        }

        .cover-label {
            background: #fff; padding: 30px 70px; font-size: 65px; font-weight: 900;
            letter-spacing: -4px; box-shadow: 0 25px 60px rgba(0,0,0,0.12);
        }

        /* --- 4. 纸张层 --- */
        .paper-layer {
            position: absolute; inset: 12px; background: var(--paper); z-index: 10;
            box-shadow: 0 15px 60px rgba(0,0,0,0.1); padding: 120px 80px;
            transition: 0.8s var(--apple-curve); opacity: 0; transform: translateZ(-40px);
        }
        .paper-layer.active { opacity: 1; transform: translateZ(0); }

        /* --- 5. 独立交互书签 (Apple 交互) --- */
        .side-nav {
            position: absolute; left: 100%; top: 120px; z-index: 2000;
            display: flex; flex-direction: column; gap: 8px; transform: translateX(-15px);
        }
        .nav-item {
            width: 90px; height: 36px; background: rgba(0,0,0,0.06);
            font-size: 9px; font-weight: 900; display: flex; align-items: center; 
            padding-left: 15px; border-radius: 0 4px 4px 0; color: #777;
            backdrop-filter: blur(10px); transition: 0.4s var(--apple-curve);
            cursor: pointer; pointer-events: auto;
        }
        .nav-item:hover { background: #000; color: #fff; width: 120px; transform: translateX(5px); }
        .nav-item.active { background: #000; color: #fff; width: 125px; transform: translateX(10px); }

        /* 内容文案 */
        .t-num { font-size: 10px; font-weight: 900; opacity: 0.2; letter-spacing: 5px; margin-bottom: 25px; }
        .t-main { font-size: clamp(40px, 8vw, 75px); font-weight: 900; letter-spacing: -4px; line-height: 0.85; margin: 0; }
        .t-desc { font-size: 19px; line-height: 1.5; color: #222; margin-top: 45px; max-width: 480px; font-weight: 400; }

        /* 自定义光标 */
        #cursor {
            position: fixed; width: 10px; height: 10px; background: #000; border-radius: 50%;
            pointer-events: none; z-index: 9999; mix-blend-mode: difference; transition: transform 0.15s;
        }

        @media (max-width: 768px) {
            .paper-layer { padding: 80px 35px; }
            .side-nav { left: auto; right: 0; transform: translateX(80px); bottom: 60px; top: auto; }
            .side-nav:hover { transform: translateX(0); }
            .cover-label { font-size: 40px; padding: 20px 40px; }
            .photo-pin { width: 130px; right: 20px; top: 20px; }
        }
    </style>
</head>
<body>

<div id="cursor"></div>

<div class="nav-zone prev-z" onclick="go(-1)"></div>
<div class="nav-zone next-z" onclick="go(1)"></div>

<div class="stage">
    <div class="book-container" id="book">
        
        <div class="acrylic-plate back-cover">
            <div class="graphic-barcode">
                <div class="barcode-lines"></div>
                <div class="barcode-merged-text">MADEINDALI</div>
                <div style="font-family:monospace; font-size:10px; margin-top:15px; letter-spacing:5px; opacity:0.5;">1998 // ARCHIVE</div>
            </div>
        </div>

        <div class="paper-layer" id="paper">
            <div class="t-num" id="p-idx">INDEX / 01</div>
            <h2 class="t-main" id="p-title">LOADING...</h2>
            <p class="t-desc" id="p-desc">...</p>
        </div>

        <nav class="side-nav">
            <div class="nav-item" onclick="jump(1)">01_CREATION</div>
            <div class="nav-item" onclick="jump(2)">02_STRATEGY</div>
            <div class="nav-item" onclick="jump(3)">03_DISTRO</div>
            <div class="nav-item" onclick="jump(4)">04_SCRAPBOOK</div>
            <div class="nav-item" onclick="jump(5)">05_PROFILE</div>
        </nav>

        <div class="acrylic-plate front-cover" id="cover">
            <div class="steel-clip"></div>
            <div class="photo-pin">
                <img src="me.jpg" alt="Lydia Yang">
                <div style="margin-top:10px; font-size:8px; opacity:0.3; font-family:monospace;">ID_ARCHIVE_98</div>
            </div>
            <div class="cover-label">WORKS</div>
            <div style="position:absolute; bottom:40px; font-size:9px; letter-spacing:5px; font-weight:700; opacity:0.4;">[ SERIES_V8.3_ACCESS ]</div>
        </div>

    </div>
</div>

<script>
    let step = 0; // 0:Cover, 1-5:Pages, 6:Back
    const data = [
        {},
        { i: "INDEX / 01", t: "CONTENT<br>CREATION", d: "Experimental archival aesthetics. High-fidelity visual logic meet industrial minimalism." },
        { i: "INDEX / 02", t: "STRATEGIC<br>LOGIC", d: "Engineering narratives that stick. Defining the intersection of technical rigor and creative intuition." },
        { i: "INDEX / 03", t: "GLOBAL<br>DISTRO", d: "Strategic signal optimization across fragmented networks. Calibrating resonance in the 2026 era." },
        { i: "INDEX / 04", t: "THE<br>SCRAPBOOK", d: "Raw insights and tactical prototypes. The unfiltered engine room of digital development." },
        { i: "INDEX / 05", t: "IDENTITY<br>PROFILE", d: "Lydia Yang. Content Strategist. Established 1998. Driven by the logic of the perfect blur." }
    ];

    // 自定义光标 Apple 效果
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    // 独立书签跳转
    function jump(n) {
        event.stopPropagation(); // 阻止触发区域翻页
        step = n;
        render();
    }

    function go(dir) {
        step = Math.max(0, Math.min(6, step + dir));
        render();
    }

    function render() {
        const cv = document.getElementById('cover');
        const pp = document.getElementById('paper');
        const items = document.querySelectorAll('.nav-item');
        
        // 书签状态同步
        items.forEach((item, idx) => {
            item.classList.toggle('active', (idx + 1) === step);
        });

        if (step === 0) {
            cv.classList.remove('open');
            pp.classList.remove('active');
        } else if (step === 6) {
            cv.classList.add('open');
            pp.classList.remove('active');
            pp.style.transform = "translateZ(-150px)";
        } else {
            cv.classList.add('open');
            pp.classList.add('active');
            
            const p = data[step];
            document.getElementById('p-idx').innerText = p.i;
            document.getElementById('p-title').innerHTML = p.t;
            document.getElementById('p-desc').innerText = p.d;
        }
    }

    // 初始渲染
    render();
</script>
</body>
</html>
