<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>IBM_5150 // ARCHIVE_1998</title>
    <style>
        :root {
            --win-blue: #008080;
            --win-gray: #c0c0c0;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            font-family: 'Tahoma', sans-serif;
        }

        /* 环境层：放置那张复古电脑图片 */
        #setup-wrapper {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #111; /* 背景色 */
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1);
        }

        /* 模拟图片中的电脑显示器部分 */
        #monitor-case {
            width: 650px; height: 500px;
            background: url('https://images.unsplash.com/photo-1591405351990-4726e331f141?q=80&w=2000') no-repeat center; /* 建议换成你上传的那张图 */
            background-size: contain;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        /* 关键：点击感应区（正好覆盖图片里的屏幕位置） */
        #screen-trigger {
            width: 320px; height: 240px;
            background: #000;
            border-radius: 5px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            top: -20px; /* 根据图片位置微调 */
            box-shadow: inset 0 0 40px #000;
        }

        /* 内部 Windows 系统桌面 */
        #os-desktop {
            width: 100%; height: 100%;
            background: var(--win-blue);
            display: none; /* 初始关闭 */
            flex-direction: column;
            position: relative;
        }

        /* --- 窗口样式 --- */
        .window {
            position: absolute; width: 200px; background: var(--win-gray);
            border: 2px solid; border-color: #fff #808080 #808080 #fff;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            display: none; flex-direction: column; z-index: 100;
        }
        .title-bar {
            background: #000080; color: white; padding: 2px 5px;
            display: flex; justify-content: space-between; font-size: 10px;
        }
        .window-body {
            background: white; margin: 2px; padding: 10px;
            border: 2px solid; border-color: #808080 #fff #fff #808080;
            font-size: 11px; color: black; min-height: 80px;
        }

        /* 桌面图标 */
        .icon-grid { padding: 10px; display: grid; grid-gap: 15px; }
        .icon { display: flex; flex-direction: column; align-items: center; color: #fff; font-size: 9px; cursor: pointer; }
        .icon img { width: 24px; margin-bottom: 2px; }

        /* 任务栏 */
        #taskbar { margin-top: auto; height: 25px; background: var(--win-gray); border-top: 2px solid #fff; display: flex; align-items: center; padding: 2px; }
        .start-btn { border: 2px solid; border-color: #fff #808080 #808080 #fff; padding: 0 5px; font-weight: bold; font-size: 10px; }

        /* --- 放大动画 --- */
        .zoomed { transform: scale(3.5); } /* 这里的倍数决定了拉近的深度 */

    </style>
</head>
<body>

    <div id="setup-wrapper">
        <div id="monitor-case">
            <div id="screen-trigger" onclick="bootUp()">
                <div id="boot-log" style="color: #0f0; padding: 10px; font-size: 10px; display: none;">
                    RAM TEST: 640K OK<br>
                    BIOS V.1.02...<br>
                    BOOTING OS...
                </div>

                <div id="os-desktop">
                    <div class="icon-grid">
                        <div class="icon" onclick="openWin('Folder', 'Archival data loaded.')">
                            <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png">
                            <span>PROJECTS</span>
                        </div>
                    </div>

                    <div id="popup" class="window">
                        <div class="title-bar">
                            <span id="win-t">Title</span>
                            <button onclick="document.getElementById('popup').style.display='none'">X</button>
                        </div>
                        <div class="window-body" id="win-c"></div>
                    </div>

                    <div id="taskbar"><div class="start-btn">Start</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function bootUp() {
            const wrapper = document.getElementById('setup-wrapper');
            const bootLog = document.getElementById('boot-log');
            const desktop = document.getElementById('os-desktop');

            // 1. 镜头拉近动画
            wrapper.classList.add('zoomed');
            
            // 2. 模拟黑屏后的 BIOS 文字
            setTimeout(() => { bootLog.style.display = 'block'; }, 800);

            // 3. 进入 Windows 桌面
            setTimeout(() => {
                bootLog.style.display = 'none';
                desktop.style.display = 'flex';
            }, 2500);
        }

        function openWin(t, c) {
            const p = document.getElementById('popup');
            document.getElementById('win-t').innerText = t;
            document.getElementById('win-c').innerText = c;
            p.style.display = 'flex';
            p.style.top = '20px'; p.style.left = '20px';
        }
    </script>
</body>
</html>
