<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Archive Fragments | 档案实验室</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --tab-h: 46px; /* 标签高度 */
            --transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'EB Garamond', serif;
            height: 100vh; overflow: hidden;
        }

        /* 顶部装饰栏 */
        header {
            padding: 20px 40px;
            display: flex; justify-content: space-between;
            font-size: 12px; text-transform: uppercase; letter-spacing: 2px;
            border-bottom: 1px solid #333;
            background: var(--bg-dark);
            position: relative; z-index: 1000;
        }

        .archive-container {
            position: relative;
            height: calc(100vh - 60px);
            width: 100%;
        }

        /* 文件夹单个层级 */
        .folder-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0; top: 0;
            transition: transform var(--transition);
            display: flex;
            flex-direction: column;
        }

        /* 标签：解决点不动的关键是把标签放在内容区外面 */
        .tab {
            height: var(--tab-h);
            padding: 0 30px;
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            border-radius: 12px 12px 0 0;
            width: fit-content;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
            pointer-events: auto; /* 确保可点击 */
            z-index: 10;
        }

        /* 内容区 */
        .content {
            flex: 1;
            padding: 60px 10%;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }

        /* --- 核心：激活态转换 --- */

        /* 选中的那个直接冲到最顶上，不偏移 */
        .folder-layer.active {
            z-index: 500 !important;
            transform: translateY(0) !important;
        }

        /* 选中时的标签变侧边栏 */
        .folder-layer.active .tab {
            position: absolute;
            right: 0; top: 100px;
            writing-mode: vertical-rl;
            height: 200px; width: 46px;
            padding: 20px 0;
            border-radius: 15px 0 0 15px;
            transform: translateX(0);
        }

        /* --- 颜色与初始偏移 (风琴褶皱效果) --- */
        /* 这里的 transform 是关键，让它们像阶梯一样露出来 */
        #layer1 { z-index: 1; transform: translateY(0px); }
        #layer1 .tab, #layer1 .content { background: #7b2cbf; }

        #layer2 { z-index: 2; transform: translateY(46px); }
        #layer2 .tab, #layer2 .content { background: #3f37c9; }

        #layer3 { z-index: 3; transform: translateY(92px); }
        #layer3 .tab, #layer3 .content { background: #ef233c; }

        #layer4 { z-index: 4; transform: translateY(138px); }
        #layer4 .tab, #layer4 .content { background: #f8961e; }

        #layer5 { z-index: 5; transform: translateY(184px); }
        #layer5 .tab, #layer5 .content { background: #fee440; color: #333; }

        /* 内容装饰 */
        .inner { max-width: 800px; opacity: 0; transform: translateY(20px); transition: 0.5s 0.3s; }
        .active .inner { opacity: 1; transform: translateY(0); }
        h1 { font-size: 70px; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <div>Recovered Fragments</div>
    <div>File: 2026-ALPHA</div>
</header>

<div class="archive-container" id="main-container">
    
    <div class="folder-layer" id="layer1" data-order="0">
        <div class="tab">Lexical Interruptions</div>
        <div class="content"><div class="inner"><h1>Fragment 15</h1><p>这是紫色档案的内容...</p></div></div>
    </div>

    <div class="folder-layer" id="layer2" data-order="1">
        <div class="tab">Concord Variants</div>
        <div class="content"><div class="inner"><h1>Fragment 16</h1><p>这是蓝色档案的内容...</p></div></div>
    </div>

    <div class="folder-layer" id="layer3" data-order="2">
        <div class="tab">Unanchored Statements</div>
        <div class="content"><div class="inner"><h1>Fragment 17</h1><p>这是红色档案的内容...</p></div></div>
    </div>

    <div class="folder-layer" id="layer4" data-order="3">
        <div class="tab">Varnell Collection</div>
        <div class="content"><div class="inner"><h1>Fragment 18</h1><p>这是橙色档案的内容...</p></div></div>
    </div>

    <div class="folder-layer active" id="layer5" data-order="4">
        <div class="tab">Margin Events</div>
        <div class="content"><div class="inner"><h1>Fragment 19</h1><p>这是黄色档案的内容。默认它是打开的。</p></div></div>
    </div>

</div>

<script>
    const layers = document.querySelectorAll('.folder-layer');
    const tabH = 46;

    // 核心逻辑：重新计算所有未激活层的位置
    function resetPositions() {
        layers.forEach((layer) => {
            if (!layer.classList.contains('active')) {
                const order = layer.getAttribute('data-order');
                layer.style.transform = `translateY(${order * tabH}px)`;
                layer.style.zIndex = parseInt(order) + 1;
            }
        });
    }

    layers.forEach((layer) => {
        const tab = layer.querySelector('.tab');
        tab.addEventListener('click', (e) => {
            // 清除旧的 active
            layers.forEach(l => l.classList.remove('active'));
            // 设为 active
            layer.classList.add('active');
            // 重新排列其他层
            resetPositions();
        });
    });

    // 初始化执行一次
    resetPositions();
</script>

</body>
</html>
