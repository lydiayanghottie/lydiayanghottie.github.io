<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VICE_OS // ARCHIVE_1998</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --win-gray: #c0c0c0;
            --taskbar-glass: rgba(0, 0, 0, 0.6);
        }

        * { box-sizing: border-box; cursor: crosshair; font-family: 'Courier New', monospace; }

        body, html { margin: 0; padding: 0; height: 100vh; background: #000; overflow: hidden; }

        /* --- GTA 风格 CRT 滤镜 --- */
        body::after {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px; z-index: 10000; pointer-events: none;
        }

        /* --- BIOS & 加载条 --- */
        #boot-screen {
            position: fixed; inset: 0; background: #000; color: var(--neon-blue);
            padding: 40px; z-index: 9999; display: flex; flex-direction: column;
        }
        #load-bar-container {
            width: 300px; height: 20px; border: 2px solid var(--neon-pink);
            margin-top: 20px; display: none; position: relative;
        }
        #load-bar { height: 100%; background: var(--neon-pink); width: 0%; transition: 0.1s; }

        /* --- 桌面 (GTA 背景) --- */
        #desktop {
            position: relative; width: 100vw; height: 100vh;
            background: linear-gradient(45deg, #2b0054 0%, #ff00ff55 100%), url('https://web.archive.org/web/20021004052145im_/https://www.rockstargames.com/vicecity/screenshots/screenshot1.jpg');
            background-size: cover; background-position: center;
            display: none; padding: 20px;
        }

        /* 文件夹图标 */
        .icon {
            width: 80px; height: 90px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: #fff;
            text-shadow: 2px 2px #000; margin-bottom: 20px;
        }
        .icon img { width: 50px; filter: drop-shadow(2px 2px var(--neon-pink)); }
        .icon span { font-size: 10px; font-weight: bold; margin-top: 5px; background: rgba(0,0,0,0.5); }

        /* --- 真实的 Windows 窗口 --- */
        .window {
            position: absolute; width: 350px; background: var(--win-gray);
            border: 2px solid; border-color: #fff #808080 #808080 #fff;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.5); display: flex; flex-direction: column;
        }
        .title-bar {
            background: linear-gradient(90deg, #800080, var(--neon-pink));
            color: white; padding: 4px 8px; display: flex; 
            justify-content: space-between; align-items: center; cursor: grab;
        }
        .title-controls button {
            width: 18px; height: 18px; font-size: 10px; background: var(--win-gray);
            border: 1px solid #000; cursor: pointer; margin-left: 2px;
        }
        .window-content {
            margin: 2px; background: #fff; border: 2px solid;
            border-color: #808080 #fff #fff #808080; padding: 15px;
            height: 200px; overflow-y: auto; color: #000;
        }

        /* --- 任务栏 --- */
        #taskbar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 40px;
            background: var(--taskbar-glass); backdrop-filter: blur(10px);
            border-top: 2px solid var(--neon-blue); display: flex; align-items: center; padding: 0 10px;
        }
        .start-btn {
            background: var(--neon-pink); color: #fff; border: none;
            padding: 5px 15px; font-weight: bold; font-style: italic;
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div id="bios-text"></div>
        <div id="load-bar-container"><div id="load-bar"></div></div>
    </div>

    <div id="desktop">
        <div class="icon" onclick="createWindow(1)">
            <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png">
            <span>01_CREATION</span>
        </div>
        <div class="icon" onclick="createWindow(2)">
            <img src="https://win98icons.alexmeub.com/icons/png/directory_closed-4.png">
            <span>02_STRATEGY</span>
        </div>
        <div id="taskbar">
            <button class="start-btn">VICE_OS</button>
            <div id="clock" style="margin-left:auto; color:var(--neon-blue); font-weight:bold;"></div>
        </div>
    </div>

    <script>
        const biosLines = ["Initializing VICE_OS...", "Video: RAGE Engine v1.0", "Loading assets...", "Ready."];
        let line = 0;
        const biosEl = document.getElementById('bios-text');

        // 1. 模拟开机
        function runBios() {
            if (line < biosLines.length) {
                biosEl.innerHTML += "> " + biosLines[line] + "<br>";
                line++;
                setTimeout(runBios, 500);
            } else {
                document.getElementById('load-bar-container').style.display = 'block';
                fillBar();
            }
        }
        runBios();

        function fillBar() {
            let w = 0;
            const bar = document.getElementById('load-bar');
            const int = setInterval(() => {
                w += 2; bar.style.width = w + "%";
                if(w >= 100) {
                    clearInterval(int);
                    document.getElementById('boot-screen').style.display = 'none';
                    document.getElementById('desktop').style.display = 'block';
                }
            }, 30);
        }

        // 2. 窗口管理系统
        let topZ = 100;
        const data = {
            1: { title: "CREATION", content: "Experimental designs and archival logic." },
            2: { title: "STRATEGY", content: "Engineering narratives for the digital era." }
        };

        function createWindow(id) {
            const winData = data[id];
            const win = document.createElement('div');
            win.className = 'window';
            win.style.left = (50 + id * 30) + 'px';
            win.style.top = (50 + id * 30) + 'px';
            win.style.zIndex = ++topZ;

            win.innerHTML = `
                <div class="title-bar">
                    <span>${winData.title}</span>
                    <div class="title-controls">
                        <button onclick="this.closest('.window').remove()">X</button>
                    </div>
                </div>
                <div class="window-content">${winData.content}</div>
            `;

            document.getElementById('desktop').appendChild(win);
            makeDraggable(win);
        }

        // 3. 真实拖拽逻辑
        function makeDraggable(win) {
            const bar = win.querySelector('.title-bar');
            bar.onmousedown = (e) => {
                win.style.zIndex = ++topZ;
                let shiftX = e.clientX - win.getBoundingClientRect().left;
                let shiftY = e.clientY - win.getBoundingClientRect().top;

                document.onmousemove = (e) => {
                    win.style.left = e.clientX - shiftX + 'px';
                    win.style.top = e.clientY - shiftY + 'px';
                };
                document.onmouseup = () => { document.onmousemove = null; };
            };
        }

        // 4. 时钟
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
