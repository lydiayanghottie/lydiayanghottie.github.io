<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lydia Yang | Side-Tab Archive</title>
    <style>
        :root {
            --bg: #0d0d0f;
            --frosted-cover: rgba(255, 255, 255, 0.08);
            --inner-paper: rgba(253, 253, 251, 0.92); /* 封面下的那一层纸 */
            --paper-main: #fdfdfb;
            --c1: rgba(210, 100, 100, 0.8); 
            --c2: rgba(100, 140, 210, 0.8); 
            --c3: rgba(100, 210, 140, 0.8); 
            --c4: rgba(210, 180, 100, 0.8); 
            --c5: rgba(160, 100, 210, 0.8);
            --smooth: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--bg);
            margin: 0; overflow: hidden;
            height: 100dvh; display: flex; justify-content: center; align-items: center;
            font-family: "Arial", sans-serif;
        }

        #cursor {
            width: 40px; height: 40px;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            mix-blend-mode: difference;
            transition: transform 0.1s var(--smooth);
        }
        #cursor::after { content: ""; width: 2px; height: 2px; background: white; border-radius: 50%; }

        .stage {
            position: relative;
            width: 95%; max-width: 1100px; height: 85vh;
            display: flex;
        }

        /* --- 1. 封面系统 (带内置纸张) --- */
        .cover-system {
            position: absolute; inset: 0; z-index: 1000;
            transition: all 1.2s var(--smooth);
            transform-origin: left center;
        }
        .cover-system.hide { transform: rotateY(-110deg); opacity: 0; pointer-events: none; }

        /* 磨砂塑料面 */
        .cover-front {
            position: absolute; inset: 0;
            background: var(--frosted-cover);
            backdrop-filter: blur(35px) saturate(150%);
            -webkit-backdrop-filter: blur(35px) saturate(150%);
            border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; border: 1px solid rgba(255,255,255,0.1);
            z-index: 2;
        }
        
        /* 封面下的第一张纸 (遮挡书签主体) */
        .cover-paper-layer {
            position: absolute; inset: 15px;
            background: var(--inner-paper);
            border-radius: 4px;
            z-index: 1; /* 夹在封面和书签之间 */
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .mj-logo { font-family: "Arial Black", sans-serif; font-size: clamp(40px, 8vw, 70px); font-weight: 900; letter-spacing: -3px; line-height: 0.9; text-align: center; }
        .mj-sub { font-size: 10px; letter-spacing: 5px; margin-top: 20px; opacity: 0.8; }

        /* --- 2. 侧边书签导航 (响应式移动) --- */
        .tab-nav {
            position: absolute; 
            right: -10px; top: 100px; /* 默认靠右侧 */
            display: flex; flex-direction: column; gap: 8px;
            z-index: 50; /* 封面系统会盖住它的左半部分 */
        }

        .tab {
            width: 100px; height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 0 8px 8px 0;
            display: flex; align-items: center; padding-left: 15px;
            font-size: 10px; font-weight: 900; color: white;
            text-transform: uppercase; cursor: pointer;
            transition: 0.4s var(--smooth);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tab:hover, .tab.active { width: 130px; padding-left: 30px; opacity: 1; }

        /* --- 3. 内页内容 --- */
        .main-paper {
            position: absolute; inset: 10px;
            background: var(--paper-main); border-radius: 8px;
            transform: scale(0.9) translateY(50px); opacity: 0;
            transition: all 0.8s var(--smooth);
            padding: 60px; color: #111;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            z-index: 10;
        }
        .stage.active .main-paper { transform: scale(1) translateY(0); opacity: 1; }

        .doc-title { font-family: "Arial Black", sans-serif; font-size: clamp(32px, 6vw, 56px); letter-spacing: -2px; line-height: 0.9; margin: 0; }
        .doc-body { font-family: "Georgia", serif; font-style: italic; font-size: 18px; line-height: 1.6; margin-top: 30px; color: #333; }

        .btn-close { position: absolute; top: 30px; right: 40px; font-size: 20px; font-weight: bold; color: #ccc; cursor: pointer; }

        /* --- 4. 手机竖屏专项优化 --- */
        @media (max-width: 600px) {
            .tab-nav { 
                right: -5px; top: auto; bottom: 100px; 
                gap: 5px;
            }
            .tab { width: 70px; height: 38px; font-size: 8px; padding-left: 10px; }
            .tab:hover, .tab.active { width: 90px; padding-left: 15px; }
            .main-paper { padding: 30px; padding-top: 80px; inset: 5px; }
            #cursor { display: none; }
            .mj-logo { font-size: 44px; }
        }
    </style>
</head>
<body>

<div id="cursor"></div>

<div class="stage" id="stage">
    
    <div class="cover-system" id="cover" onclick="unlock()">
        <div class="cover-paper-layer"></div>
        <div class="cover-front">
            <div class="mj-logo">LYDIA<br>YANG</div>
            <div class="mj-sub">PROJECT_DOSSIER_2026</div>
            <p style="position:absolute; bottom:40px; font-size:8px; letter-spacing:3px; opacity:0.5;">[ PRESS TO ACCESS ]</p>
        </div>
    </div>

    <nav class="tab-nav">
        <div class="tab" id="t1" style="background:var(--c1)" onclick="load(1)">Creative</div>
        <div class="tab" id="t2" style="background:var(--c2)" onclick="load(2)">Strategy</div>
        <div class="tab" id="t3" style="background:var(--c3)" onclick="load(3)">Distro</div>
        <div class="tab" id="t4" style="background:var(--c4)" onclick="load(4)">Notes</div>
        <div class="tab" id="t5" style="background:var(--c5)" onclick="load(5)">About</div>
    </nav>

    <div class="main-paper">
        <div class="btn-close" onclick="lock()">×</div>
        <div style="font-family:monospace; font-size:10px; color:#aaa; margin-bottom:20px;">REF_NO: MJ-0<span id="f-ref">0</span></div>
        <h1 class="doc-title" id="f-title">SELECT_FILE</h1>
        <p class="doc-body" id="f-desc">请从侧边索引标签中提取所需档案数据。</p>
        
        <div id="f-photo" style="display:none; margin-top:30px;">
            <div style="width:140px; background:white; padding:10px 10px 35px 10px; box-shadow:0 10px 30px rgba(0,0,0,0.1); transform:rotate(-2deg); border:1px solid #eee;">
                <img src="me.jpg" style="width:100%; display:block;" alt="Lydia">
            </div>
        </div>
    </div>

</div>

<script>
    // 鼠标位置同步
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', (e) => {
        cursor.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
    });

    const data = {
        1: { title: "Visual<br>Engineering", ref: "7", desc: "A pursuit of industrial precision within digital interfaces. We explore the tension between rigid grid systems and the fluid nature of modern screens." },
        2: { title: "Strategic<br>Logic", ref: "8", desc: "Every pixel must have a purpose. By decoding user psychology, we build narrative architectures that are as functional as they are beautiful." },
        3: { title: "Signal<br>Pathways", ref: "2", desc: "Optimizing the flow of information across fragmented networks. Ensuring that the brand's core frequency remains undisturbed by digital noise." },
        4: { title: "Raw<br>Insights", ref: "1", desc: "Unprocessed thoughts on skeuomorphism, the tactile web, and the return of physical metaphors in a purely digital existence." },
        5: { title: "About<br>Lydia Yang", ref: "0", desc: "Lydia is a strategist focused on the intersection of human storytelling and high-tech aesthetics. She believes the best digital experiences should feel like a well-worn archive." }
    };

    function unlock() {
        document.getElementById('cover').classList.add('hide');
        setTimeout(() => load(1), 500);
    }

    function load(id) {
        document.getElementById('stage').classList.add('active');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t' + id).classList.add('active');

        const content = data[id];
        document.getElementById('f-title').innerHTML = content.title;
        document.getElementById('f-ref').innerText = content.ref;
        document.getElementById('f-desc').innerText = content.desc;
        
        document.getElementById('f-photo').style.display = (id === 5) ? 'block' : 'none';
    }

    function lock() {
        document.getElementById('cover').classList.remove('hide');
        document.getElementById('stage').classList.remove('active');
    }
</script>

</body>
</html>
