<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYDIA YANG // ARCHIVE_9.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #c5c5c1; 
            --paper: #ffffff;
            --glass: rgba(255, 255, 255, 0.3);
            --curve: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; cursor: crosshair; }
        body { background-color: var(--bg); margin: 0; overflow: hidden; height: 100dvh; font-family: 'Inter', sans-serif; }

        .click-zone { position: fixed; top: 0; bottom: 0; z-index: 5000; width: 45%; }
        .next { right: 0; } .prev { left: 0; }

        .stage { position: relative; width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; perspective: 2500px; }

        .book-container {
            position: relative; width: 90%; max-width: 900px; height: 85vh;
            transform-style: preserve-3d;
        }

        /* --- 1. 封底 (带 MADE IN DALI 条形码) --- */
        .back-cover {
            position: absolute; inset: 0; z-index: 5;
            background: var(--glass);
            backdrop-filter: blur(40px) brightness(0.9); -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
            display: flex; align-items: flex-end; justify-content: flex-end; padding: 50px;
        }
        .barcode-area {
            display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
        }
        .real-barcode {
            width: 160px; height: 50px;
            background: repeating-linear-gradient(90deg, #000, #000 1px, transparent 1px, transparent 3px),
                        repeating-linear-gradient(90deg, #000, #000 2px, transparent 2px, transparent 5px);
            opacity: 0.8;
        }
        .barcode-label {
            font-family: monospace; font-size: 10px; font-weight: 900; 
            letter-spacing: 1px; color: #000;
        }

        /* --- 2. 纸张内容层 --- */
        .paper-stack {
            position: absolute; inset: 12px; background: var(--paper); z-index: 10;
            box-shadow: 0 20px 80px rgba(0,0,0,0.12); border-radius: 2px;
            padding: 100px 80px; transition: opacity 0.5s var(--curve);
        }

        /* 侧边书签 - 防挡优化 */
        .tabs-nav {
            position: absolute; left: 100%; top: 120px; z-index: 800;
            display: flex; flex-direction: column; gap: 5px; transform: translateX(-10px);
        }
        .tab {
            width: 90px; height: 34px; background: rgba(0,0,0,0.05);
            font-size: 9px; font-weight: 900; display: flex; align-items: center; 
            padding-left: 12px; border-radius: 0 4px 4px 0; color: #888;
            backdrop-filter: blur(10px); transition: 0.4s var(--curve);
        }
        .tab.active { background: #000; color: #fff; width: 120px; transform: translateX(0); }

        /* --- 3. 3D 磨砂封面 (Lydia Yang) --- */
        .front-cover {
            position: absolute; inset: 0; z-index: 1000;
            background: var(--glass);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
            backdrop-filter: blur(35px) saturate(110%); -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255,255,255,0.4);
            transform-origin: left center; transition: 1.2s var(--curve);
            display: flex; align-items: center; justify-content: center;
        }
        .front-cover.open { transform: rotateY(-108deg); opacity: 0; pointer-events: none; }

        .name-plate {
            background: #fff; padding: 30px 60px; font-size: clamp(40px, 8vw, 80px); 
            font-weight: 900; letter-spacing: -4px; line-height: 0.8;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1); text-align: center;
        }

        /* 封面宝丽来 + 黑色金属长尾夹 */
        .cover-photo {
            position: absolute; left: 50px; top: 60px;
            width: 180px; background: #fff; padding: 12px 12px 35px 12px;
            box-shadow: 5px 15px 30px rgba(0,0,0,0.15); transform: rotate(-3deg);
        }
        .cover-photo img { width: 100%; display: block; filter: contrast(1.05); }

        /* 黑色金属长尾夹 */
        .binder-clip {
            position: absolute; left: -15px; top: 40px;
            width: 40px; height: 35px; background: #222; /* 夹身 */
            border-radius: 2px; z-index: 1100;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .binder-clip::before { /* 银色拉环 */
            content: ""; position: absolute; left: 5px; top: 50%;
            width: 50px; height: 25px; border: 2px solid #aaa;
            border-radius: 12px; transform: translateY(-50%) rotate(-10deg);
        }

        /* 文本内容 */
        .p-title { font-size: clamp(35px, 6vw, 65px); font-weight: 900; letter-spacing: -3px; line-height: 0.9; margin: 0; }
        .p-desc { font-size: 18px; line-height: 1.5; color: #333; margin-top: 40px; max-width: 460px; }

        @media (max-width: 768px) {
            .paper-stack { padding: 60px 35px; }
            .cover-photo { width: 130px; left: 20px; top: 40px; }
            .tabs-nav { transform: translateX(70px); left: auto; right: 0; bottom: 50px; top: auto; }
            .tabs-nav:hover { transform: translateX(0); }
            .name-plate { padding: 20px 40px; font-size: 40px; }
            .binder-clip { transform: scale(0.7); left: -10px; }
        }
    </style>
</head>
<body>

<div class="click-zone prev" onclick="move(-1)"></div>
<div class="click-zone next" onclick="move(1)"></div>

<div class="stage">
    
    <div class="book-container">
        
        <div class="back-cover">
            <div class="barcode-area">
                <div class="real-barcode"></div>
                <div class="barcode-label">MADE IN DALI // 1998</div>
            </div>
        </div>

        <div class="paper-stack" id="paper">
            <div style="font-size: 9px; font-weight: 900; opacity: 0.2; letter-spacing: 4px; margin-bottom: 20px;" id="idx">ARCHIVE / 01</div>
            <h2 class="p-title" id="title">SYSTEM_INIT</h2>
            <p class="p-desc" id="desc">...</p>
        </div>

        <nav class="tabs-nav">
            <div class="tab" id="t1">01_CREATION</div>
            <div class="tab" id="t2">02_STRATEGY</div>
            <div class="tab" id="t3">03_DISTRO</div>
            <div class="tab" id="t4">04_SCRAPBOOK</div>
            <div class="tab" id="t5">05_PROFILE</div>
        </nav>

        <div class="front-cover" id="cover">
            <div class="binder-clip"></div>
            <div class="cover-photo">
                <img src="me.jpg" alt="Lydia Yang">
                <div style="margin-top:10px; font-size:8px; opacity:0.3; font-family:monospace;">ID_ARCHIVE_1998</div>
            </div>
            
            <div class="name-plate">LYDIA<br>YANG</div>
            
            <div style="position:absolute; bottom:40px; font-size:9px; letter-spacing:5px; font-weight:700; opacity:0.4;">
                EST. 1998 // CREATIVE STRATEGIST
            </div>
        </div>

    </div>

</div>

<script>
    let step = 0; // 0:Cover, 1-5:Pages, 6:End
    const content = [
        {},
        { i: "ARCHIVE / 01", t: "CONTENT<br>CREATION", d: "A rigorous exploration of visual systems. We redefine the digital archive through a lens of industrial minimalism and tactile response." },
        { i: "ARCHIVE / 02", t: "STRATEGIC<br>LOGIC", d: "Engineering narratives that survive the noise. Logic is the invisible architecture behind every creative breakthrough." },
        { i: "ARCHIVE / 03", t: "GLOBAL<br>DISTRO", d: "Calibrating signal frequency for global resonance. Ensuring the core identity remains sharp across fragmented networks." },
        { i: "ARCHIVE / 04", t: "SCRAPBOOK", d: "Unfiltered observations and technical experiments. The foundational engine of the 2026 creative system." },
        { i: "ARCHIVE / 05", t: "ABOUT<br>LYDIA", d: "Born in 1998. Currently operating at the intersection of logical infrastructure and high-fidelity visual storytelling." }
    ];

    function move(dir) {
        step = Math.max(0, Math.min(6, step + dir));
        render();
    }

    function render() {
        const cv = document.getElementById('cover');
        const pp = document.getElementById('paper');
        
        if (step === 0) {
            cv.classList.remove('open');
            pp.style.opacity = "0";
        } else if (step === 6) {
            cv.classList.add('open');
            pp.style.opacity = "0"; // 露出封底
        } else {
            cv.classList.add('open');
            pp.style.opacity = "1";
            
            const p = content[step];
            document.getElementById('idx').innerText = p.i;
            document.getElementById('title').innerHTML = p.t;
            document.getElementById('desc').innerText = p.d;

            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i + 1 === step);
            });
        }
    }
</script>

</body>
</html>
