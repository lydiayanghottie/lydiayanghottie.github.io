<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYDIA YANG // ARCHIVE_V8_ORIGINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #c5c5c1; 
            --paper: #ffffff;
            --glass: rgba(255, 255, 255, 0.42); /* V8 原始厚度 */
            --orange: #FF5722;
            --apple-curve: cubic-bezier(0.2, 0, 0, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: var(--bg); margin: 0; overflow: hidden; height: 100dvh; font-family: 'Inter', sans-serif; }

        /* 全局翻页热区 */
        .nav-zone { position: fixed; top: 0; bottom: 0; z-index: 50; width: 35%; }
        .next-z { right: 0; } .prev-z { left: 0; }

        .stage { position: relative; width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; perspective: 2500px; }

        .book-container {
            position: relative; width: 90%; max-width: 900px; height: 85vh;
            transform-style: preserve-3d; transition: transform 1.2s var(--apple-curve);
        }

        /* --- V8 原始：马赛克颗粒噪点逻辑 --- */
        .v8-acrylic {
            position: absolute; inset: 0;
            background: var(--glass);
            /* V8 核心：这个 SVG 滤镜通过设置 baseFrequency="0.01" 制造巨大的马赛克方块 */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='v8-noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.01' numOctaves='5' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23v8-noise)' opacity='0.2'/%3E%3C/svg%3E");
            background-blend-mode: soft-light;
            backdrop-filter: blur(35px) saturate(110%);
            -webkit-backdrop-filter: blur(35px) saturate(110%);
            border: 1px solid rgba(255,255,255,0.45); border-radius: 4px;
            transform-origin: left center; transition: 1.2s var(--apple-curve);
        }

        /* 封面 */
        .front-cover { z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .front-cover.open { transform: rotateY(-110deg); opacity: 0; pointer-events: none; }

        /* 封底 (与封面质感完全对齐) */
        .back-cover { z-index: 5; display: none; align-items: flex-end; justify-content: flex-end; padding: 40px; }
        .back-cover.visible { display: flex; }

        /* 橘色 WORKS */
        .works-label {
            background: #fff; padding: 25px 60px; font-size: 65px; font-weight: 900;
            letter-spacing: -4px; box-shadow: 0 25px 60px rgba(0,0,0,0.12);
            color: var(--orange);
        }

        /* 右上角别针照片 */
        .pinned-photo {
            position: absolute; right: 40px; top: 40px; width: 160px;
            background: #fff; padding: 10px 10px 30px 10px;
            box-shadow: 10px 15px 30px rgba(0,0,0,0.15); transform: rotate(2deg);
        }
        .pinned-photo img { width: 100%; display: block; }
        .steel-pin {
            position: absolute; right: 20px; top: -12px; width: 14px; height: 45px;
            border: 2.5px solid #999; border-radius: 10px; z-index: 1100;
        }
        .steel-pin::after {
            content: ""; position: absolute; top: 5px; left: 2.5px;
            width: 6px; height: 30px; border: 2.2px solid #bbb; border-top: none; border-radius: 0 0 5px 5px;
        }

        /* 封底：右下角微型条形码 */
        .mini-barcode {
            display: flex; flex-direction: column; align-items: flex-end;
            mix-blend-mode: multiply; opacity: 0.75; transform: scale(0.8);
        }
        .b-lines {
            width: 150px; height: 40px;
            background: repeating-linear-gradient(90deg, #000, #000 1.5px, transparent 1.5px, transparent 4px);
        }
        .b-label { font-family: monospace; font-size: 11px; font-weight: 900; letter-spacing: 4px; margin-top: 5px; color: #000; }

        /* 纸张层 */
        .paper-inner {
            position: absolute; inset: 10px; background: var(--paper); z-index: 100;
            box-shadow: 0 10px 50px rgba(0,0,0,0.1); padding: 100px 80px;
            opacity: 0; transform: translateZ(-30px); transition: 0.7s var(--apple-curve);
            pointer-events: none;
        }
        .paper-inner.active { opacity: 1; transform: translateZ(0); pointer-events: auto; }

        /* 独立书签跳转 */
        .nav-tabs {
            position: absolute; left: 100%; top: 120px; z-index: 2000;
            display: flex; flex-direction: column; gap: 6px; transform: translateX(-15px);
        }
        .tab-node {
            width: 85px; height: 34px; background: rgba(0,0,0,0.06);
            font-size: 9px; font-weight: 900; display: flex; align-items: center; 
            padding-left: 12px; border-radius: 0 4px 4px 0; color: #888;
            backdrop-filter: blur(10px); transition: 0.3s var(--apple-curve);
            cursor: pointer;
        }
        .tab-node:hover { background: var(--orange); color: #fff; width: 110px; }
        .tab-node.active { background: #000; color: #fff; width: 115px; transform: translateX(5px); }

        /* 文案内容 */
        .ui-idx { font-size: 10px; font-weight: 900; opacity: 0.2; letter-spacing: 5px; margin-bottom: 25px; }
        .ui-title { font-size: clamp(35px, 7vw, 70px); font-weight: 900; letter-spacing: -3px; line-height: 0.9; margin: 0; }
        .ui-desc { font-size: 18px; line-height: 1.5; color: #333; margin-top: 45px; max-width: 460px; }

        @media (max-width: 768px) {
            .nav-tabs { left: auto; right: 0; transform: translateX(75px); bottom: 60px; top: auto; }
            .nav-tabs:hover { transform: translateX(0); }
            .works-label { font-size: 45px; padding: 15px 35px; }
            .pinned-photo { width: 125px; right: 20px; top: 20px; }
        }
    </style>
</head>
<body>

<div class="nav-zone prev-z" onclick="move(-1)"></div>
<div class="nav-zone next-z" onclick="move(1)"></div>

<div class="stage">
    <div class="book-container">
        
        <div class="v8-acrylic back-cover" id="back">
            <div class="mini-barcode">
                <div class="b-lines"></div>
                <div class="b-label">MADEINDALI</div>
            </div>
        </div>

        <div class="paper-inner" id="paper">
            <div class="ui-idx" id="v-idx">INDEX / 01</div>
            <h2 class="ui-title" id="v-title">...</h2>
            <p class="ui-desc" id="v-desc">...</p>
        </div>

        <nav class="nav-tabs">
            <div class="tab-node" onclick="jump(1)">01_CREATION</div>
            <div class="tab-node" onclick="jump(2)">02_STRATEGY</div>
            <div class="tab-node" onclick="jump(3)">03_DISTRO</div>
            <div class="tab-node" onclick="jump(4)">04_SCRAPBOOK</div>
            <div class="tab-node" onclick="jump(5)">05_PROFILE</div>
        </nav>

        <div class="v8-acrylic front-cover" id="cover">
            <div class="steel-pin"></div>
            <div class="pinned-photo">
                <img src="me.jpg" alt="Lydia Yang">
            </div>
            <div class="works-label">WORKS</div>
            <div style="position:absolute; bottom:40px; font-size:9px; letter-spacing:5px; font-weight:700; opacity:0.4;">
                [ ARCHIVE_V8_TRUE_GRAIN ]
            </div>
        </div>

    </div>
</div>

<script>
    let step = 0; 
    const data = [
        {},
        { i: "INDEX / 01", t: "CONTENT<br>CREATION", d: "Experimental archival aesthetics. High-fidelity visual logic meets industrial minimalism." },
        { i: "INDEX / 02", t: "STRATEGIC<br>LOGIC", d: "Engineering narratives that stick. Defining the intersection of technical rigor and creative intuition." },
        { i: "INDEX / 03", t: "GLOBAL<br>DISTRO", d: "Strategic signal optimization across fragmented networks. Calibrating resonance in the 2026 era." },
        { i: "INDEX / 04", t: "THE<br>SCRAPBOOK", d: "Raw insights and tactical prototypes. The unfiltered engine room." },
        { i: "INDEX / 05", t: "IDENTITY<br>PROFILE", d: "Lydia Yang. Content Strategist. Established 1998. Driven by the logic of the perfect blur." }
    ];

    function jump(n) {
        event.stopPropagation();
        step = n;
        update();
    }

    function move(dir) {
        step = Math.max(0, Math.min(6, step + dir));
        update();
    }

    function update() {
        const cv = document.getElementById('cover');
        const pp = document.getElementById('paper');
        const bk = document.getElementById('back');
        const tabs = document.querySelectorAll('.tab-node');

        tabs.forEach((t, i) => t.classList.toggle('active', i + 1 === step));

        if (step === 0) {
            cv.classList.remove('open');
            pp.classList.remove('active');
            bk.classList.remove('visible');
        } 
        else if (step === 6) {
            cv.classList.add('open');
            pp.classList.remove('active');
            bk.classList.add('visible');
        } 
        else {
            cv.classList.add('open');
            bk.classList.remove('visible');
            pp.classList.add('active');
            
            const p = data[step];
            document.getElementById('v-idx').innerText = p.i;
            document.getElementById('v-title').innerHTML = p.t;
            document.getElementById('v-desc').innerText = p.d;
        }
    }
</script>
</body>
</html>
