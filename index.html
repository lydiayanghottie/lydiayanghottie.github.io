<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lydia Yang</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="book" id="book">

  <!-- 封面 -->
  <div class="page cover">
    <div class="glass"></div>
    <div class="content">
      <h1>Lydia Yang</h1>
      <p>Content Strategist</p>
    </div>
  </div>

  <!-- 内容 -->
  <div class="page">① Content Creation</div>
  <div class="page">② Content Strategy & Storytelling</div>
  <div class="page">③ Distribution & PR</div>
  <div class="page">④ Scrapbook</div>

  <!-- About -->
  <div class="page about">
    <div class="polaroid">
      <img src="assets/me.jpg">
      <img src="assets/clip.png" class="clip">
      <p>Me :)</p>
    </div>
  </div>

  <!-- 封底 -->
  <div class="page back">
    <div class="sticky">
      <p>Nice to Meet U :)</p>
    </div>
  </div>

</div>

<!-- 标签 -->
<div class="tabs">
  <div data-page="1">①</div>
  <div data-page="2">②</div>
  <div data-page="3">③</div>
  <div data-page="4">④</div>
  <div data-page="5">⑤</div>
</div>

<script src="script.js"></script>
</body>
</html>
