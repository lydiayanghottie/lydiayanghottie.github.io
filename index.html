<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYDIA YANG // ARCHIVE_V8_FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #c5c5c1; 
            --paper: #ffffff;
            --glass: rgba(255, 255, 255, 0.35); /* V8 经典半透明度 */
            --curve: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; cursor: crosshair; }
        body { background-color: var(--bg); margin: 0; overflow: hidden; height: 100dvh; font-family: 'Inter', sans-serif; }

        .click-zone { position: fixed; top: 0; bottom: 0; z-index: 5000; width: 45%; }
        .next { right: 0; } .prev { left: 0; }

        .stage { position: relative; width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; perspective: 2500px; }

        .book-container {
            position: relative; width: 90%; max-width: 900px; height: 85vh;
            transform-style: preserve-3d; transition: transform 1s var(--curve);
        }

        /* --- 1. 封底 (MADE IN DALI Graphic Barcode) --- */
        .back-cover {
            position: absolute; inset: 0; z-index: 5;
            background: var(--glass);
            backdrop-filter: blur(40px) contrast(1.1); -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 4px;
            display: flex; align-items: flex-end; justify-content: flex-end; padding: 40px;
        }
        .graphic-barcode { display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.8; }
        .barcode-lines {
            width: 180px; height: 60px;
            background: repeating-linear-gradient(90deg, #000, #000 1px, transparent 1px, transparent 4px),
                        repeating-linear-gradient(90deg, #000, #000 2px, transparent 2px, transparent 8px);
        }
        .barcode-text { font-family: monospace; font-size: 10px; font-weight: 900; letter-spacing: 2px; color: #000; }

        /* --- 2. 纸张内容层 --- */
        .paper-stack {
            position: absolute; inset: 10px; background: var(--paper); z-index: 10;
            box-shadow: 0 20px 80px rgba(0,0,0,0.15); border-radius: 2px;
            padding: 100px 80px; transition: transform 0.8s var(--curve), opacity 0.4s;
            opacity: 0; transform: translateZ(-50px);
        }

        /* 侧边书签 (V8 逻辑：防挡) */
        .tabs-nav {
            position: absolute; left: 100%; top: 100px; z-index: 800;
            display: flex; flex-direction: column; gap: 5px; transform: translateX(-10px); transition: 0.3s;
        }
        .tab {
            width: 80px; height: 32px; background: rgba(0,0,0,0.05);
            font-size: 9px; font-weight: 900; display: flex; align-items: center; 
            padding-left: 10px; border-radius: 0 4px 4px 0; color: #888;
            backdrop-filter: blur(10px); transition: 0.4s var(--curve);
        }
        .tab.active { background: #000; color: #fff; width: 110px; transform: translateX(0); }

        /* --- 3. 核心 V8 质感封面 --- */
        .front-cover {
            position: absolute; inset: 0; z-index: 1000;
            background: var(--glass);
            /* V8 关键：强噪点蒙版 */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-blend-mode: overlay;
            backdrop-filter: blur(30px) saturate(110%);
            -webkit-backdrop-filter: blur(30px) saturate(110%);
            border: 1px solid rgba(255,255,255,0.5);
            transform-origin: left center; transition: 1.2s var(--curve);
            display: flex; align-items: center; justify-content: center;
        }
        .front-cover.open { transform: rotateY(-105deg) scale(1.02); opacity: 0; pointer-events: none; }

        /* 右上角别针照片 */
        .photo-pinned {
            position: absolute; right: 40px; top: 40px;
            width: 160px; background: #fff; padding: 10px 10px 30px 10px;
            box-shadow: 10px 15px 30px rgba(0,0,0,0.15); transform: rotate(2deg);
        }
        .photo-pinned img { width: 100%; display: block; }
        .circle-clip {
            position: absolute; right: 20px; top: -10px;
            width: 14px; height: 45px; border: 2.5px solid #999; border-radius: 10px;
            z-index: 1100; box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .circle-clip::after {
            content: ""; position: absolute; top: 5px; left: 2.5px;
            width: 6px; height: 30px; border: 2px solid #bbb; border-top: none; border-radius: 0 0 5px 5px;
        }

        .cover-plate {
            background: #fff; padding: 25px 60px; font-size: 60px; font-weight: 900;
            letter-spacing: -3px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-transform: uppercase;
        }

        /* 文字内容 */
        .title { font-size: clamp(40px, 8vw, 80px); font-weight: 900; letter-spacing: -4px; line-height: 0.85; margin: 0; }
        .desc { font-size: 18px; line-height: 1.4; color: #333; margin-top: 40px; max-width: 450px; }

        @media (max-width: 768px) {
            .photo-pinned { width: 120px; right: 20px; top: 20px; }
            .tabs-nav { top: auto; bottom: 40px; left: auto; right: 0; transform: translateX(60px); }
            .tabs-nav:hover { transform: translateX(0); } 
            .cover-plate { padding: 15px 30px; font-size: 35px; }
        }
    </style>
</head>
<body>

<div class="click-zone prev" onclick="go(-1)"></div>
<div class="click-zone next" onclick="go(1)"></div>

<div class="stage">
    <div class="book-container">
        <div class="back-cover">
            <div class="graphic-barcode">
                <div class="barcode-lines"></div>
                <div class="barcode-text">MADE IN DALI // 1998</div>
            </div>
        </div>

        <div class="paper-stack" id="paper">
            <div style="font-size: 10px; font-weight: 900; opacity: 0.2; letter-spacing: 3px;" id="p-idx">INDEX / 01</div>
            <h2 class="title" id="p-title">SYSTEM_INIT</h2>
            <p class="desc" id="p-desc">Content loading...</p>
        </div>

        <nav class="tabs-nav">
            <div class="tab" id="t1">01_CREATION</div>
            <div class="tab" id="t2">02_STRATEGY</div>
            <div class="tab" id="t3">03_DISTRO</div>
            <div class="tab" id="t4">04_SCRAPBOOK</div>
            <div class="tab" id="t5">05_PROFILE</div>
        </nav>

        <div class="front-cover" id="cover">
            <div class="circle-clip"></div>
            <div class="photo-pinned">
                <img src="me.jpg" alt="Lydia Yang">
                <div style="margin-top:10px; font-size:8px; opacity:0.3; font-family:monospace;">ARCHIVE_ID_98</div>
            </div>
            <div class="cover-plate">WORKS</div>
            <div style="position:absolute; bottom:40px; font-size:9px; letter-spacing:4px; font-weight:700; opacity:0.4;">
                [ 1998_SERIES_ARCHIVE ]
            </div>
        </div>
    </div>
</div>

<script>
    let step = 0; 
    const data = [
        {},
        { i: "INDEX / 01", t: "CONTENT<br>CREATION", d: "Experimental archival aesthetics. Merging industrial precision with digital fluidity." },
        { i: "INDEX / 02", t: "STRATEGIC<br>LOGIC", d: "Engineering narratives that stick. We bridge the gap between technical rigor and human intuition." },
        { i: "INDEX / 03", t: "GLOBAL<br>DISTRO", d: "Calibrating signals in a hyper-connected era. Strategic signal optimization." },
        { i: "INDEX / 04", t: "THE<br>SCRAPBOOK", d: "Raw insights and tactical prototypes. The unfiltered engine room." },
        { i: "INDEX / 05", t: "IDENTITY<br>PROFILE", d: "Lydia Yang. Content Strategist. Based in the intersection of logic and vision. Established 1998." }
    ];

    function go(dir) {
        step = Math.max(0, Math.min(6, step + dir));
        render();
    }

    function render() {
        const cv = document.getElementById('cover');
        const pp = document.getElementById('paper');
        
        if (step === 0) {
            cv.classList.remove('open');
            pp.style.opacity = "0";
            pp.style.transform = "translateZ(-50px)";
        } else if (step === 6) {
            cv.classList.add('open');
            pp.style.opacity = "0"; 
            pp.style.transform = "translateZ(-120px)";
        } else {
            cv.classList.add('open');
            pp.style.opacity = "1";
            pp.style.transform = "translateZ(0px)";
            
            const p = data[step];
            document.getElementById('p-idx').innerText = p.i;
            document.getElementById('p-title').innerHTML = p.t;
            document.getElementById('p-desc').innerText = p.d;

            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i + 1 === step);
            });
        }
    }
</script>
</body>
</html>
