<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lydia's Retro Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --win-blue: #008080;
            --win-gray: #c0c0c0;
            --crt-green: #33ff66;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* 1. 真实背景层 */
        .world {
            position: relative;
            width: 100vw; height: 100vh;
            background: url('pc.jpg') no-repeat center center; /* 确保文件名对上 */
            background-size: contain;
            display: flex; align-items: center; justify-content: center;
        }

        /* 2. 核心：在显示器位置挖洞 */
        .screen-container {
            position: absolute;
            /* 以下百分比是根据你的图片精确计算的屏幕位置 */
            top: 36.4%; 
            left: 21.6%;
            width: 23.4%;
            height: 35.4%;

            /* 物理透视：让内容带一点点倾斜，贴合照片里的角度 */
            transform: rotateZ(-0.8deg) skewX(0.5deg);
            
            background: #000;
            overflow: hidden;
            box-shadow: inset 3px 3px 10px rgba(0,0,0,0.9);
            cursor: pointer;
        }

        /* 3. CRT 玻璃质感层 */
        .glass-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%);
            z-index: 100; pointer-events: none;
            /* 扫描线效果 */
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 2px);
        }

        /* --- 内部 Windows 系统样式 --- */
        #os-desktop {
            width: 100%; height: 100%;
            background: var(--win-blue);
            display: none; /* 初始关机 */
            flex-direction: column;
            position: relative;
            font-family: 'Tahoma', sans-serif;
        }

        /* 桌面图标 */
        .icons { padding: 5px; }
        .icon { 
            width: 35px; display: flex; flex-direction: column; align-items: center; 
            margin-bottom: 8px; cursor: pointer;
        }
        .icon img { width: 18px; image-rendering: pixelated; }
        .icon span { font-size: 6px; color: #fff; text-align: center; margin-top: 2px; text-shadow: 1px 1px #000; }

        /* 任务栏 */
        .taskbar {
            margin-top: auto; height: 14px; background: var(--win-gray);
            border-top: 1px solid #fff; display: flex; align-items: center; padding: 0 2px;
        }
        .start-btn { 
            border: 1px solid; border-color: #fff #808080 #808080 #fff;
            font-size: 6px; padding: 0 3px; font-weight: bold; height: 10px; display: flex; align-items: center;
        }

        /* 引导文字 */
        #boot-log {
            padding: 8px; color: var(--crt-green); font-family: 'VT323', monospace; font-size: 9px; line-height: 1.2;
        }

        /* 弹窗样式 */
        .window {
            position: absolute; background: var(--win-gray);
            border: 1px solid; border-color: #fff #808080 #808080 #fff;
            width: 80%; top: 10%; left: 10%; display: none; flex-direction: column;
            box-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }
        .title-bar { background: #000080; color: #fff; font-size: 6px; padding: 1px 3px; display: flex; justify-content: space-between; }
        .win-body { background: #fff; padding: 5px; font-size: 7px; color: #000; min-height: 40px; }
    </style>
</head>
<body>

<div class="world">
    <div class="screen-container" onclick="powerOn()">
        <div class="glass-overlay"></div>
        
        <div id="boot-log">点击屏幕开机...</div>

        <div id="os-desktop">
            <div class="icons">
                <div class="icon" onclick="showWin()">
                    <img src="https://win98icons.alexmeub.com/icons/png/notepad-5.png">
                    <span>README.txt</span>
                </div>
            </div>

            <div id="popup-win" class="window">
                <div class="title-bar">
                    <span>Notepad</span>
                    <span onclick="event.stopPropagation(); hideWin()">[X]</span>
                </div>
                <div class="win-body">
                    Welcome to Lydia's Desktop.<br>
                    Real texture version 1.0
                </div>
            </div>

            <div class="taskbar">
                <div class="start-btn">Start</div>
            </div>
        </div>
    </div>
</div>

<script>
    let isBooted = false;
    function powerOn() {
        if(isBooted) return;
        isBooted = true;
        const log = document.getElementById('boot-log');
        
        // 模拟 BIOS 加载
        const lines = [
            "> Initializing...",
            "> Memory Check: 640K OK",
            "> Loading Windows 98...",
            "> Ready."
        ];
        
        let i = 0;
        log.innerHTML = "";
        const timer = setInterval(() => {
            if(i < lines.length) {
                log.innerHTML += lines[i] + "<br>";
                i++;
            } else {
                clearInterval(timer);
                setTimeout(() => {
                    log.style.display = 'none';
                    document.getElementById('os-desktop').style.display = 'flex';
                }, 500);
            }
        }, 400);
    }

    function showWin() { document.getElementById('popup-win').style.display = 'flex'; }
    function hideWin() { document.getElementById('popup-win').style.display = 'none'; }
</script>

</body>
</html>
