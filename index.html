<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYDIA YANG // V8_WORKS_FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #c5c5c1; 
            --paper: #ffffff;
            --glass: rgba(255, 255, 255, 0.38);
            --orange: #FF5722;
            --apple-curve: cubic-bezier(0.2, 0, 0, 1);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: var(--bg); margin: 0; overflow: hidden; height: 100dvh; font-family: 'Inter', sans-serif; }

        /* 点击翻页热区 */
        .nav-zone { position: fixed; top: 0; bottom: 0; z-index: 50; width: 35%; }
        .next-z { right: 0; } .prev-z { left: 0; }

        .stage { position: relative; width: 100%; height: 100dvh; display: flex; align-items: center; justify-content: center; perspective: 2500px; }

        .book-container {
            position: relative; width: 90%; max-width: 900px; height: 85vh;
            transform-style: preserve-3d; transition: transform 1.2s var(--apple-curve);
        }

        /* --- V8 核心磨砂算法 --- */
        .v8-acrylic {
            position: absolute; inset: 0;
            background: var(--glass);
            /* V8 标志性强噪点蒙版 */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
            background-blend-mode: overlay;
            backdrop-filter: blur(35px) saturate(120%);
            -webkit-backdrop-filter: blur(35px) saturate(120%);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 4px;
            transform-origin: left center; transition: 1.2s var(--apple-curve);
        }

        /* 封面层 */
        .front-cover { z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .front-cover.open { transform: rotateY(-110deg); opacity: 0; pointer-events: none; }

        /* 封底层 (逻辑隔离) */
        .back-cover { z-index: 5; display: none; align-items: flex-end; justify-content: flex-end; padding: 40px; }
        .back-cover.visible { display: flex; }

        /* 橘色 WORKS */
        .label-works {
            background: #fff; padding: 25px 60px; font-size: 65px; font-weight: 900;
            letter-spacing: -4px; box-shadow: 0 25px 60px rgba(0,0,0,0.1);
            color: var(--orange);
        }

        /* 右下角微型条形码 */
        .barcode-wrap {
            display: flex; flex-direction: column; align-items: flex-end;
            mix-blend-mode: multiply; opacity: 0.7; transform: scale(0.85);
        }
        .b-lines {
            width: 160px; height: 45px;
            background: repeating-linear-gradient(90deg, #000, #000 1.5px, transparent 1.5px, transparent 4.5px);
        }
        .b-text { font-family: monospace; font-size: 11px; font-weight: 900; letter-spacing: 4px; margin-top: 6px; color: #000; }

        /* 照片别针系统 */
        .photo-pinned {
            position: absolute; right: 40px; top: 40px; width: 165px;
            background: #fff; padding: 10px 10px 32px 10px;
            box-shadow: 10px 15px 30px rgba(0,0,0,0.15); transform: rotate(2deg);
        }
        .photo-pinned img { width: 100%; display: block; }
        .clip {
            position: absolute; right: 20px; top: -12px; width: 14px; height: 45px;
            border: 2.5px solid #999; border-radius: 10px; z-index: 1100;
        }
        .clip::after {
            content: ""; position: absolute; top: 5px; left: 2.5px;
            width: 6px; height: 30px; border: 2.2px solid #bbb; border-top: none; border-radius: 0 0 5px 5px;
        }

        /* 内部纸张 */
        .paper-inner {
            position: absolute; inset: 10px; background: var(--paper); z-index: 100;
            box-shadow: 0 10px 50px rgba(0,0,0,0.1); padding: 100px 80px;
            opacity: 0; transform: translateZ(-30px); transition: 0.7s var(--apple-curve);
            pointer-events: none;
        }
        .paper-inner.active { opacity: 1; transform: translateZ(0); pointer-events: auto; }

        /* 独立书签 (Apple交互) */
        .nav-tabs {
            position: absolute; left: 100%; top: 120px; z-index: 2000;
            display: flex; flex-direction: column; gap: 6px; transform: translateX(-15px);
        }
        .tab {
            width: 85px; height: 35px; background: rgba(0,0,0,0.06);
            font-size: 9px; font-weight: 900; display: flex; align-items: center; 
            padding-left: 12px; border-radius: 0 4px 4px 0; color: #888;
            backdrop-filter: blur(10px); transition: 0.3s var(--apple-curve);
            cursor: pointer;
        }
        .tab:hover { background: var(--orange); color: #fff; width: 110px; }
        .tab.active { background: #000; color: #fff; width: 115px; transform: translateX(5px); }

        /* 内容 */
        .p-idx { font-size: 10px; font-weight: 900; opacity: 0.2; letter-spacing: 5px; margin-bottom: 25px; }
        .p-title { font-size: clamp(35px, 7vw, 70px); font-weight: 900; letter-spacing: -3px; line-height: 0.9; margin: 0; }
        .p-desc { font-size: 18px; line-height: 1.5; color: #333; margin-top: 45px; max-width: 460px; }

        @media (max-width: 768px) {
            .nav-tabs { left: auto; right: 0; transform: translateX(75px); bottom: 60px; top: auto; }
            .nav-tabs:hover { transform: translateX(0); }
            .label-works { font-size: 42px; padding: 18px 35px; }
            .photo-pinned { width: 125px; right: 20px; top: 20px; }
        }
    </style>
</head>
<body>

<div class="nav-zone prev-z" onclick="changeStep(-1)"></div>
<div class="nav-zone next-z" onclick="changeStep(1)"></div>

<div class="stage">
    <div class="book-container">
        
        <div class="v8-acrylic back-cover" id="back_plate">
            <div class="barcode-wrap">
                <div class="b-lines"></div>
                <div class="b-text">MADEINDALI</div>
                <div style="font-family:monospace; font-size:8px; opacity:0.3; margin-top:5px; letter-spacing:2px;">©1998_LYDIA_YANG</div>
            </div>
        </div>

        <div class="paper-inner" id="paper_content">
            <div class="p-idx" id="ui_idx">ARCHIVE / 01</div>
            <h2 class="p-title" id="ui_title">...</h2>
            <p class="p-desc" id="ui_desc">...</p>
        </div>

        <nav class="nav-tabs">
            <div class="tab" onclick="jumpToPage(1)">01_CREATION</div>
            <div class="tab" onclick="jumpToPage(2)">02_STRATEGY</div>
            <div class="tab" onclick="jumpToPage(3)">03_DISTRO</div>
            <div class="tab" onclick="jumpToPage(4)">04_SCRAPBOOK</div>
            <div class="tab" onclick="jumpToPage(5)">05_PROFILE</div>
        </nav>

        <div class="v8-acrylic front-cover" id="cover_plate">
            <div class="clip"></div>
            <div class="photo-pinned">
                <img src="me.jpg" alt="Lydia Yang">
            </div>
            <div class="label-works">WORKS</div>
            <div style="position:absolute; bottom:40px; font-size:9px; letter-spacing:5px; font-weight:700; opacity:0.4;">
                [ 1998_SERIES_ARCHIVE_V8 ]
            </div>
        </div>

    </div>
</div>

<script>
    let currentStep = 0; // 0:Cover, 1-5:Pages, 6:Back
    const content = [
        {},
        { i: "ARCHIVE / 01", t: "CONTENT<br>CREATION", d: "Experimental archival aesthetics. High-fidelity visual logic meets industrial minimalism." },
        { i: "ARCHIVE / 02", t: "STRATEGIC<br>LOGIC", d: "Engineering narratives that stick. Defining the intersection of technical rigor and creative intuition." },
        { i: "ARCHIVE / 03", t: "GLOBAL<br>DISTRO", d: "Strategic signal optimization across fragmented networks. Calibrating resonance in the modern era." },
        { i: "ARCHIVE / 04", t: "THE<br>SCRAPBOOK", d: "Raw insights and tactical prototypes. The unfiltered engine room of digital development." },
        { i: "ARCHIVE / 05", t: "IDENTITY<br>PROFILE", d: "Lydia Yang. Content Strategist. Established 1998. Driven by the logic of the perfect blur." }
    ];

    // 独立标签跳转：允许直接点击任意标签
    function jumpToPage(n) {
        event.stopPropagation();
        currentStep = n;
        renderArchive();
    }

    // 基础左右步进
    function changeStep(dir) {
        currentStep = Math.max(0, Math.min(6, currentStep + dir));
        renderArchive();
    }

    function renderArchive() {
        const cover = document.getElementById('cover_plate');
        const paper = document.getElementById('paper_content');
        const back = document.getElementById('back_plate');
        const tabs = document.querySelectorAll('.tab');

        // 同步标签高亮
        tabs.forEach((t, i) => t.classList.toggle('active', i + 1 === currentStep));

        if (currentStep === 0) {
            cover.classList.remove('open');
            paper.classList.remove('active');
            back.classList.remove('visible'); // 封面步隐藏封底
        } 
        else if (currentStep === 6) {
            cover.classList.add('open');
            paper.classList.remove('active');
            back.classList.add('visible'); // 仅在封底步显示
        } 
        else {
            cover.classList.add('open');
            back.classList.remove('visible'); // 纸张步隐藏封底，防穿透
            paper.classList.add('active');
            
            const data = content[currentStep];
            document.getElementById('ui_idx').innerText = data.i;
            document.getElementById('ui_title').innerHTML = data.t;
            document.getElementById('ui_desc').innerText = data.d;
        }
    }
</script>
</body>
</html>
